<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Breakout - RehaVerse Games</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;touch-action:none;font-family:'Segoe UI',sans-serif}
  canvas{border-radius:8px;cursor:pointer;max-width:100vw;max-height:100vh}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const actx=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,t,d){const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(0.1,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}
function hitBrick(row){tone(400+row*80,'square',0.08);}
function hitPaddle(){tone(250,'triangle',0.06);}
function hitWall(){tone(200,'sine',0.04);}
function loseLife(){tone(150,'sawtooth',0.3);setTimeout(()=>tone(100,'sawtooth',0.3),150);}
function winSound(){[0,80,160,240,320].forEach((d,i)=>setTimeout(()=>tone(400+i*100,'square',0.15),d));}

const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;
function resize(){W=Math.min(window.innerWidth-10,600);H=Math.min(window.innerHeight-10,700);c.width=W;c.height=H;}
window.addEventListener('resize',resize);resize();

const COLS=8,ROWS=5,PAD_H=14;
const COLORS=['#ef4444','#f97316','#f59e0b','#10b981','#3b82f6'];
let paddle,ball,bricks,score,lives,playing;

function init(){
  actx.resume();
  const BW=(W-20)/COLS,BH=24;
  paddle={x:W/2-50,w:100};
  ball={x:W/2,y:H-50,dx:3.5,dy:-3.5,r:8};
  bricks=[];score=0;lives=3;playing=true;
  for(let r=0;r<ROWS;r++)for(let col=0;col<COLS;col++){
    bricks.push({x:10+col*BW,y:50+r*(BH+5),w:BW-4,h:BH,color:COLORS[r],row:r,alive:true});
  }
}

function update(){
  if(!playing)return;
  ball.x+=ball.dx;ball.y+=ball.dy;
  if(ball.x-ball.r<0){ball.x=ball.r;ball.dx=Math.abs(ball.dx);hitWall();}
  if(ball.x+ball.r>W){ball.x=W-ball.r;ball.dx=-Math.abs(ball.dx);hitWall();}
  if(ball.y-ball.r<0){ball.y=ball.r;ball.dy=Math.abs(ball.dy);hitWall();}
  // Paddle
  if(ball.dy>0&&ball.y+ball.r>=H-30&&ball.x>paddle.x&&ball.x<paddle.x+paddle.w){
    ball.dy*=-1;ball.dx=((ball.x-(paddle.x+paddle.w/2))/(paddle.w/2))*5;ball.y=H-30-ball.r;hitPaddle();
  }
  if(ball.y>H+20){lives--;loseLife();if(lives<=0){playing=false;return;}ball.x=W/2;ball.y=H-50;ball.dx=3.5;ball.dy=-3.5;}
  // Bricks
  bricks.forEach(b=>{if(!b.alive)return;
    if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){
      b.alive=false;ball.dy*=-1;score+=10*(b.row+1);hitBrick(b.row);
    }
  });
  if(bricks.every(b=>!b.alive)){playing=false;winSound();}
}

function draw(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  bricks.forEach(b=>{if(!b.alive)return;ctx.fillStyle=b.color;ctx.beginPath();ctx.roundRect(b.x,b.y,b.w,b.h,5);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(b.x+2,b.y+2,b.w-4,4);
  });
  // Paddle
  const pg=ctx.createLinearGradient(paddle.x,0,paddle.x+paddle.w,0);pg.addColorStop(0,'#7c3aed');pg.addColorStop(1,'#a855f7');
  ctx.fillStyle=pg;ctx.beginPath();ctx.roundRect(paddle.x,H-30,paddle.w,PAD_H,7);ctx.fill();
  // Ball
  ctx.shadowColor='#f59e0b';ctx.shadowBlur=12;ctx.fillStyle='#f59e0b';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  // HUD
  ctx.fillStyle='#fff';ctx.font='bold 16px Segoe UI';ctx.textAlign='left';ctx.fillText('Score: '+score,12,30);
  ctx.textAlign='right';ctx.fillText('❤️'.repeat(lives),W-12,30);
  if(!playing){
    ctx.fillStyle='rgba(10,10,26,0.85)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle='#fff';ctx.font='bold 30px Segoe UI';
    const won=bricks.every(b=>!b.alive);ctx.fillText(won?'You Win! 🎉':'Game Over',W/2,H/2-20);
    ctx.fillStyle='#a855f7';ctx.font='18px Segoe UI';ctx.fillText('Score: '+score,W/2,H/2+15);ctx.fillText('Tap to play again',W/2,H/2+50);
  }
}

function loop(){update();draw();requestAnimationFrame(loop);}
c.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();paddle.x=Math.max(0,Math.min(W-paddle.w,(e.clientX-r.left)*(W/r.width)-paddle.w/2));});
c.addEventListener('touchmove',e=>{e.preventDefault();const r=c.getBoundingClientRect();paddle.x=Math.max(0,Math.min(W-paddle.w,(e.touches[0].clientX-r.left)*(W/r.width)-paddle.w/2));});
c.addEventListener('click',()=>{actx.resume();if(!playing)init();});
init();loop();
</script>
</body>
</html>
