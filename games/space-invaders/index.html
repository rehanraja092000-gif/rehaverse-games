<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Space Invaders - RehaVerse Games</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;touch-action:none;font-family:'Segoe UI',sans-serif}
  canvas{border-radius:8px;cursor:crosshair;max-width:100vw;max-height:calc(100vh - 70px)}
  .mobile-ctrls{display:none;gap:8px;margin-top:8px}
  .mc{padding:12px 20px;background:#1a1a3e;border:2px solid #06b6d4;border-radius:10px;color:#fff;font-size:1.1rem;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .mc:active{background:#06b6d4}
  @media(max-width:768px){.mobile-ctrls{display:flex}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="mobile-ctrls">
  <button class="mc" ontouchstart="moveDir=-1" ontouchend="moveDir=0">◀</button>
  <button class="mc" ontouchstart="shoot()" style="background:#06b6d4">🔫 Fire</button>
  <button class="mc" ontouchstart="moveDir=1" ontouchend="moveDir=0">▶</button>
</div>
<script>
const actx=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,t,d){const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(0.08,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}
function shootSound(){tone(800,'square',0.06);setTimeout(()=>tone(600,'square',0.04),30);}
function hitSound(){tone(200,'sawtooth',0.1);setTimeout(()=>tone(150,'square',0.08),50);}
function dieSound(){tone(100,'sawtooth',0.4);setTimeout(()=>tone(60,'sawtooth',0.5),200);}
function waveSound(){[0,80,160].forEach((d,i)=>setTimeout(()=>tone(500+i*100,'square',0.1),d));}

const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;function resize(){W=Math.min(window.innerWidth-10,560);H=Math.min(window.innerHeight-80,650);c.width=W;c.height=H;}
window.addEventListener('resize',resize);resize();

let player,bullets,enemies,eBullets,score,lives,wave,playing,eDir,eSpeed,shootTimer,moveDir=0,keys={};

function init(){
  actx.resume();player={x:W/2,y:H-40,w:40,h:16};
  bullets=[];eBullets=[];score=0;lives=3;wave=1;playing=true;eDir=1;eSpeed=1;shootTimer=0;spawnEnemies();
}

function spawnEnemies(){
  enemies=[];const rows=4,cols=Math.min(8,Math.floor(W/55));
  for(let r=0;r<rows;r++)for(let c2=0;c2<cols;c2++)enemies.push({x:30+c2*55,y:45+r*38,w:32,h:22,alive:true,type:r});
}

function shoot(){if(!playing){init();return;}shootSound();bullets.push({x:player.x,y:player.y-14});}

function update(){
  if(!playing)return;shootTimer++;
  // Player movement
  if(keys.ArrowLeft||moveDir===-1)player.x=Math.max(20,player.x-5);
  if(keys.ArrowRight||moveDir===1)player.x=Math.min(W-20,player.x+5);
  bullets=bullets.filter(b=>{b.y-=7;return b.y>0;});
  eBullets=eBullets.filter(b=>{b.y+=4;return b.y<H;});
  let hitEdge=false;
  enemies.forEach(e=>{if(!e.alive)return;e.x+=eDir*eSpeed;if(e.x<=5||e.x+e.w>=W-5)hitEdge=true;});
  if(hitEdge){eDir*=-1;enemies.forEach(e=>{e.y+=14;});}
  const alive=enemies.filter(e=>e.alive);
  if(alive.length&&shootTimer%50===0){const s=alive[Math.floor(Math.random()*alive.length)];eBullets.push({x:s.x+s.w/2,y:s.y+s.h});}
  bullets.forEach(b=>{enemies.forEach(e=>{if(e.alive&&b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h){e.alive=false;b.y=-10;score+=10*(e.type+1);hitSound();}});});
  eBullets.forEach(b=>{if(b.x>player.x-player.w/2&&b.x<player.x+player.w/2&&b.y>player.y&&b.y<player.y+player.h){b.y=H+10;lives--;if(lives<=0){playing=false;dieSound();}else tone(300,'triangle',0.15);}});
  if(alive.some(e=>e.y+e.h>=player.y)){playing=false;dieSound();}
  if(!alive.length){wave++;eSpeed=Math.min(3.5,1+wave*0.35);spawnEnemies();waveSound();}
}

function draw(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.08)';for(let i=0;i<25;i++)ctx.fillRect((i*97)%W,(i*53+score)%H,2,2);
  // Player
  ctx.fillStyle='#3b82f6';ctx.beginPath();ctx.moveTo(player.x,player.y-10);ctx.lineTo(player.x-player.w/2,player.y+player.h);ctx.lineTo(player.x+player.w/2,player.y+player.h);ctx.fill();
  ctx.fillStyle='#60a5fa';ctx.fillRect(player.x-3,player.y-16,6,8);
  // Enemies
  const eC=['#10b981','#f59e0b','#ef4444','#a855f7'];
  enemies.forEach(e=>{if(!e.alive)return;ctx.fillStyle=eC[e.type];ctx.fillRect(e.x,e.y,e.w,e.h);
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(e.x+5,e.y+5,7,7);ctx.fillRect(e.x+e.w-12,e.y+5,7,7);
    ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(e.x,e.y,e.w,3);
  });
  ctx.fillStyle='#fbbf24';bullets.forEach(b=>{ctx.shadowColor='#fbbf24';ctx.shadowBlur=6;ctx.fillRect(b.x-2,b.y,4,10);});ctx.shadowBlur=0;
  ctx.fillStyle='#ef4444';eBullets.forEach(b=>{ctx.fillRect(b.x-2,b.y,4,8);});
  ctx.fillStyle='#fff';ctx.font='bold 15px Segoe UI';ctx.textAlign='left';ctx.fillText('Score: '+score,10,26);
  ctx.textAlign='right';ctx.fillText('Wave: '+wave+'  ❤️×'+lives,W-10,26);
  if(!playing){ctx.fillStyle='rgba(10,10,26,0.88)';ctx.fillRect(0,0,W,H);ctx.textAlign='center';ctx.fillStyle='#fff';ctx.font='bold 30px Segoe UI';ctx.fillText('Game Over',W/2,H/2-22);ctx.fillStyle='#06b6d4';ctx.font='18px Segoe UI';ctx.fillText('Score: '+score,W/2,H/2+14);ctx.fillStyle='#a855f7';ctx.font='15px Segoe UI';ctx.fillText('Tap Fire to play again',W/2,H/2+48);}
}

function loop(){update();draw();requestAnimationFrame(loop);}
document.addEventListener('keydown',e=>{keys[e.key]=true;if(e.code==='Space'){e.preventDefault();shoot();}});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
c.addEventListener('click',e=>{actx.resume();const r=c.getBoundingClientRect();player.x=Math.max(20,Math.min(W-20,(e.clientX-r.left)*(W/r.width)));shoot();});
c.addEventListener('touchmove',e=>{e.preventDefault();const r=c.getBoundingClientRect();player.x=Math.max(20,Math.min(W-20,(e.touches[0].clientX-r.left)*(W/r.width)));});
init();loop();
</script>
</body>
</html>
