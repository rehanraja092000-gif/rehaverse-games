<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Car Racing 3D - RehaVerse Games</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;overflow:hidden;touch-action:none;font-family:'Segoe UI',sans-serif}
  canvas{display:block}
  #hud{position:fixed;top:14px;left:0;right:0;display:flex;justify-content:center;gap:20px;z-index:10;pointer-events:none}
  .hi{background:rgba(10,10,26,0.65);padding:8px 16px;border-radius:10px;color:#fff;font-weight:700;border:1px solid rgba(59,130,246,0.4)}
  .hi span{color:#3b82f6}
  .arrows{position:fixed;bottom:20px;left:0;right:0;display:none;justify-content:space-between;padding:0 24px;z-index:10;pointer-events:none}
  .ab{width:96px;height:96px;border-radius:50%;background:rgba(59,130,246,0.25);border:2px solid rgba(255,255,255,0.3);display:flex;align-items:center;justify-content:center;font-size:2rem;color:#fff;pointer-events:auto;-webkit-tap-highlight-color:transparent;user-select:none}
  .ab:active{background:rgba(59,130,246,0.6)}
  @media(max-width:820px){.arrows{display:flex}}
  #overlay{position:fixed;inset:0;background:rgba(10,10,26,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;color:#fff;text-align:center;padding:20px}
  #overlay h1{font-size:2.3rem;margin-bottom:6px;background:linear-gradient(135deg,#3b82f6,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  #overlay p{color:#94a3b8;margin-bottom:8px}
  #overlay .res{color:#f59e0b;font-size:1.4rem;font-weight:800;margin-bottom:8px}
  #overlay .hint{font-size:0.82rem;color:#64748b;margin-bottom:18px}
  #overlay button{padding:15px 40px;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;border:none;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div id="hud">
  <div class="hi">Score: <span id="score">0</span></div>
  <div class="hi">Speed: <span id="speed">0</span> km/h</div>
</div>
<div class="arrows">
  <div class="ab" ontouchstart="steer=-1" ontouchend="steer=0">◀</div>
  <div class="ab" ontouchstart="steer=1" ontouchend="steer=0">▶</div>
</div>
<div id="overlay">
  <h1>🏎️ Car Racing 3D</h1>
  <p>Weave through traffic — the faster you go, the higher your score!</p>
  <div class="res" id="ovRes"></div>
  <div class="hint">Steer with ← → or A / D • Avoid the other cars</div>
  <button onclick="startGame()">Race</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const actx=new(window.AudioContext||window.webkitAudioContext)();
let eng=null,engG=null;
function startEngine(){if(eng)return;eng=actx.createOscillator();engG=actx.createGain();eng.type='sawtooth';eng.frequency.value=60;engG.gain.value=0;eng.connect(engG);engG.connect(actx.destination);eng.start();}
function tone(f,t,d,v=0.08){const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}
function passSound(){tone(700,'sine',0.08);}
function crashSound(){tone(160,'sawtooth',0.4);setTimeout(()=>tone(80,'sawtooth',0.5),150);}

let scene,camera,renderer,playerCar,traffic=[],roadLines=[],scenery=[];
let score=0,best=0,speed=0,playing=false,steer=0,laneX=0,keys={};
const ROAD_W=12,LANES=[-4,0,4],SPAWN_Z=-160;

scene=new THREE.Scene();
scene.fog=new THREE.Fog(0x9ec5e8,60,180);
camera=new THREE.PerspectiveCamera(68,window.innerWidth/window.innerHeight,0.1,400);
camera.position.set(0,5,9);camera.lookAt(0,1,-20);

renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setClearColor(0x9ec5e8);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.HemisphereLight(0xffffff,0x556677,0.9));
const sun=new THREE.DirectionalLight(0xffffff,0.7);sun.position.set(20,30,10);scene.add(sun);

// Road
const roadGeo=new THREE.PlaneGeometry(ROAD_W,600);
const roadMat=new THREE.MeshPhongMaterial({color:0x2b2f36});
const road=new THREE.Mesh(roadGeo,roadMat);road.rotation.x=-Math.PI/2;road.position.z=-280;scene.add(road);
// Grass
const grassGeo=new THREE.PlaneGeometry(200,600);
const grassMat=new THREE.MeshPhongMaterial({color:0x3f8f4f});
const grass=new THREE.Mesh(grassGeo,grassMat);grass.rotation.x=-Math.PI/2;grass.position.set(0,-0.05,-280);scene.add(grass);
// Edge lines
[-ROAD_W/2,ROAD_W/2].forEach(x=>{const g=new THREE.PlaneGeometry(0.3,600);const m=new THREE.MeshBasicMaterial({color:0xffffff});const e=new THREE.Mesh(g,m);e.rotation.x=-Math.PI/2;e.position.set(x,0.02,-280);scene.add(e);});
// Dashed center lines
for(let i=0;i<60;i++){
  [-2,2].forEach(x=>{
    const g=new THREE.PlaneGeometry(0.25,4);const m=new THREE.MeshBasicMaterial({color:0xf5d020});
    const l=new THREE.Mesh(g,m);l.rotation.x=-Math.PI/2;l.position.set(x,0.02,-i*10);scene.add(l);roadLines.push(l);
  });
}

function makeCar(color){
  const g=new THREE.Group();
  const bodyMat=new THREE.MeshPhongMaterial({color,shininess:80});
  const body=new THREE.Mesh(new THREE.BoxGeometry(2,0.7,4),bodyMat);body.position.y=0.6;g.add(body);
  const top=new THREE.Mesh(new THREE.BoxGeometry(1.7,0.6,2),new THREE.MeshPhongMaterial({color,shininess:80}));top.position.set(0,1.15,-0.2);g.add(top);
  const glassMat=new THREE.MeshPhongMaterial({color:0x223344,shininess:120});
  const wind=new THREE.Mesh(new THREE.BoxGeometry(1.55,0.45,0.1),glassMat);wind.position.set(0,1.2,0.8);g.add(wind);
  const wheelGeo=new THREE.CylinderGeometry(0.4,0.4,0.3,12);const wheelMat=new THREE.MeshPhongMaterial({color:0x111111});
  [[-1,-1.3],[1,-1.3],[-1,1.3],[1,1.3]].forEach(([x,z])=>{const w=new THREE.Mesh(wheelGeo,wheelMat);w.rotation.z=Math.PI/2;w.position.set(x,0.4,z);g.add(w);});
  return g;
}

playerCar=makeCar(0x3b82f6);scene.add(playerCar);

// Roadside scenery (trees)
function makeTree(x,z){
  const g=new THREE.Group();
  const trunk=new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.4,2,6),new THREE.MeshPhongMaterial({color:0x6b4226}));trunk.position.y=1;g.add(trunk);
  const leaves=new THREE.Mesh(new THREE.ConeGeometry(1.6,3,7),new THREE.MeshPhongMaterial({color:0x2e7d32}));leaves.position.y=3.2;g.add(leaves);
  g.position.set(x,0,z);return g;
}
for(let i=0;i<40;i++){
  const side=Math.random()>0.5?1:-1;
  const t=makeTree(side*(ROAD_W/2+4+Math.random()*8),-i*16-Math.random()*10);
  scene.add(t);scenery.push(t);
}

const TRAFFIC_COLORS=[0xef4444,0xf59e0b,0x10b981,0xa855f7,0xffffff,0x06b6d4];
function spawnTraffic(){
  const car=makeCar(TRAFFIC_COLORS[Math.floor(Math.random()*TRAFFIC_COLORS.length)]);
  const lane=LANES[Math.floor(Math.random()*LANES.length)];
  car.position.set(lane,0,SPAWN_Z-Math.random()*40);
  car.userData={lane,passed:false};
  scene.add(car);traffic.push(car);
}

function startGame(){
  actx.resume();startEngine();
  traffic.forEach(t=>scene.remove(t));traffic=[];
  score=0;speed=40;playing=true;laneX=0;playerCar.position.x=0;
  document.getElementById('overlay').style.display='none';
  for(let i=0;i<5;i++)spawnTraffic();
}

function endGame(){
  playing=false;crashSound();if(engG)engG.gain.value=0;
  if(score>best)best=score;
  const ov=document.getElementById('overlay');
  ov.querySelector('h1').textContent='💥 Crash!';
  ov.querySelector('p').textContent='You hit another car.';
  document.getElementById('ovRes').textContent='Score: '+score+'  •  Best: '+best;
  ov.querySelector('button').textContent='Race Again';
  ov.style.display='flex';
}

let spawnTimer=0;
function animate(){
  requestAnimationFrame(animate);
  if(playing){
    // Steering
    const dir=steer||(keys['ArrowLeft']||keys['KeyA']?-1:keys['ArrowRight']||keys['KeyD']?1:0);
    laneX+=dir*0.18;
    laneX=Math.max(-ROAD_W/2+1.2,Math.min(ROAD_W/2-1.2,laneX));
    playerCar.position.x+=(laneX-playerCar.position.x)*0.2;
    playerCar.rotation.z=-(laneX-playerCar.position.x)*0.5-dir*0.05;
    playerCar.rotation.y=-dir*0.06;

    // Speed grows slowly
    speed=Math.min(220,speed+0.04);
    const moveZ=speed*0.0016;

    // Move road lines
    roadLines.forEach(l=>{l.position.z+=moveZ*60;if(l.position.z>10)l.position.z-=600;});
    scenery.forEach(t=>{t.position.z+=moveZ*60;if(t.position.z>15){t.position.z-=640;t.position.x=(Math.random()>0.5?1:-1)*(ROAD_W/2+4+Math.random()*8);}});

    // Traffic moves toward player
    for(let i=traffic.length-1;i>=0;i--){
      const car=traffic[i];
      car.position.z+=moveZ*60*0.75; // they also move forward, player faster
      if(!car.userData.passed&&car.position.z>playerCar.position.z){car.userData.passed=true;score+=1;passSound();document.getElementById('score').textContent=score;}
      if(car.position.z>14){scene.remove(car);traffic.splice(i,1);continue;}
      // Collision
      if(Math.abs(car.position.z-playerCar.position.z)<3.4&&Math.abs(car.position.x-playerCar.position.x)<1.9){endGame();return;}
    }

    spawnTimer++;
    const spawnRate=Math.max(28,70-speed*0.2);
    if(spawnTimer>spawnRate){spawnTimer=0;spawnTraffic();}

    document.getElementById('speed').textContent=Math.floor(speed);
    if(engG){engG.gain.value=0.04;eng.frequency.value=60+speed*1.6;}
  }
  renderer.render(scene,camera);
}

document.addEventListener('keydown',e=>{keys[e.code]=true;if(['ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
window.addEventListener('resize',()=>{camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();renderer.setSize(window.innerWidth,window.innerHeight);});
animate();
</script>
</body>
</html>
