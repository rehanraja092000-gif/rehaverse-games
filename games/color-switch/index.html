<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Color Switch - RehaVerse Games</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a1a;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;touch-action:none}
  canvas{border-radius:12px;cursor:pointer;max-width:100vw;max-height:100vh}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const actx=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,t,d){const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(0.1,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}
function jumpSound(){tone(400,'sine',0.06);setTimeout(()=>tone(520,'sine',0.06),40);}
function scoreSound(){tone(700,'square',0.08);setTimeout(()=>tone(900,'square',0.1),60);}
function dieSound(){tone(200,'sawtooth',0.3);setTimeout(()=>tone(100,'sawtooth',0.4),150);}

const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;function resize(){W=Math.min(window.innerWidth,420);H=Math.min(window.innerHeight,700);c.width=W;c.height=H;}
window.addEventListener('resize',resize);resize();

const COLORS=['#ef4444','#f59e0b','#10b981','#3b82f6'];
let ball,obstacles,score,best=0,playing,started,scrollY;

function init(){
  ball={y:H*0.7,vy:0,color:0,r:13};obstacles=[];score=0;scrollY=0;playing=false;started=false;
  for(let i=0;i<6;i++)addObstacle(H*0.35-i*160);
}

function addObstacle(y){
  obstacles.push({y,rotation:Math.random()*Math.PI*2,speed:0.015+Math.random()*0.01,colorSwitch:Math.floor(Math.random()*4),radius:55+Math.random()*10});
}

function jump(){actx.resume();if(!started){started=true;playing=true;}if(!playing){init();return;}ball.vy=-7.5;jumpSound();}

function update(){
  if(!playing)return;
  ball.vy+=0.32;ball.y+=ball.vy;
  if(ball.y<H*0.4){const d=H*0.4-ball.y;ball.y=H*0.4;scrollY+=d;obstacles.forEach(o=>o.y+=d);}
  obstacles=obstacles.filter(o=>o.y<H+120);
  const topY=Math.min(...obstacles.map(o=>o.y));if(topY>60)addObstacle(topY-160);
  obstacles.forEach(o=>o.rotation+=o.speed);
  // Check passing through center
  obstacles.forEach(o=>{
    const dy=Math.abs(ball.y-o.y);
    if(dy<8&&ball.vy>0&&!o.scored){o.scored=true;score++;ball.color=o.colorSwitch;scoreSound();}
    // Collision with ring
    const dist=Math.sqrt((W/2-W/2)**2+(ball.y-o.y)**2);
    if(dist>o.radius-ball.r-6&&dist<o.radius+ball.r+6&&dist>15){
      const angle=(Math.atan2(ball.y-o.y,0)+o.rotation+Math.PI*4)%(Math.PI*2);
      const seg=Math.floor(angle/(Math.PI/2))%4;
      if(seg!==ball.color&&dy<o.radius+ball.r){/*playing=false;dieSound();if(score>best)best=score;*/}
    }
  });
  if(ball.y>H+60){playing=false;dieSound();if(score>best)best=score;}
}

function draw(){
  ctx.fillStyle='#0a0a1a';ctx.fillRect(0,0,W,H);
  obstacles.forEach(o=>{
    const cx=W/2,cy=o.y;
    ctx.lineWidth=11;
    for(let i=0;i<4;i++){ctx.beginPath();ctx.arc(cx,cy,o.radius,o.rotation+i*Math.PI/2,o.rotation+(i+1)*Math.PI/2);ctx.strokeStyle=COLORS[i];ctx.stroke();}
    ctx.fillStyle=COLORS[o.colorSwitch];ctx.beginPath();ctx.arc(cx,cy,9,0,Math.PI*2);ctx.fill();
  });
  // Ball
  ctx.shadowColor=COLORS[ball.color];ctx.shadowBlur=14;
  ctx.fillStyle=COLORS[ball.color];ctx.beginPath();ctx.arc(W/2,ball.y,ball.r,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(W/2-3,ball.y-3,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 36px Segoe UI';ctx.textAlign='center';ctx.fillText(score,W/2,45);
  if(!started){ctx.fillStyle='rgba(10,10,26,0.6)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='bold 28px Segoe UI';ctx.fillText('Color Switch',W/2,H/2-30);ctx.font='15px Segoe UI';ctx.fillStyle='#f59e0b';ctx.fillText('Tap to jump through rings',W/2,H/2+10);}
  else if(!playing){ctx.fillStyle='rgba(10,10,26,0.8)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#fff';ctx.font='bold 30px Segoe UI';ctx.fillText('Game Over',W/2,H/2-30);ctx.fillStyle='#f59e0b';ctx.font='20px Segoe UI';ctx.fillText('Score: '+score+'  Best: '+best,W/2,H/2+10);ctx.fillStyle='#a855f7';ctx.font='14px Segoe UI';ctx.fillText('Tap to retry',W/2,H/2+45);}
}

function loop(){update();draw();requestAnimationFrame(loop);}
c.addEventListener('click',jump);c.addEventListener('touchstart',e=>{e.preventDefault();jump();});
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();jump();}});
init();loop();
</script>
</body>
</html>
