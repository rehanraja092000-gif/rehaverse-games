<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe - RehaVerse Games</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif;color:#fff;padding:16px}
  h1{font-size:2rem;color:#3b82f6;margin-bottom:10px}
  #status{font-size:1.1rem;color:#94a3b8;margin-bottom:14px;min-height:28px}
  .scores{display:flex;gap:20px;margin-bottom:16px}
  .sc{text-align:center;background:#1a1a3e;padding:8px 20px;border-radius:10px;min-width:70px}
  .sc .num{font-size:1.6rem;font-weight:800}.sc .lbl{font-size:0.65rem;color:#64748b;text-transform:uppercase}
  .sc.you .num{color:#3b82f6}.sc.ai .num{color:#ef4444}.sc.draw .num{color:#f59e0b}
  #board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;width:100%;max-width:340px}
  .cell{aspect-ratio:1;background:#1a1a3e;border:2px solid #24245a;border-radius:14px;font-size:3rem;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
  @media(min-width:600px){#board{max-width:420px}.cell{font-size:4rem}}
  .cell:hover{background:#24245a;border-color:#3b82f6}
  .cell.x{color:#3b82f6}.cell.o{color:#ef4444}
  .cell.win{background:rgba(124,58,237,0.3);border-color:#a855f7;transform:scale(1.05)}
  .btns{display:flex;gap:10px;margin-top:20px}
  .btn{padding:12px 24px;border:none;border-radius:10px;font-size:0.95rem;font-weight:700;cursor:pointer}
  .btn-primary{background:#3b82f6;color:#fff}.btn-secondary{background:#1a1a3e;color:#94a3b8;border:1px solid #24245a}
</style>
</head>
<body>
<h1>❌ Tic Tac Toe</h1>
<div class="scores">
  <div class="sc you"><div class="num" id="sYou">0</div><div class="lbl">You (X)</div></div>
  <div class="sc draw"><div class="num" id="sDraw">0</div><div class="lbl">Draw</div></div>
  <div class="sc ai"><div class="num" id="sAI">0</div><div class="lbl">AI (O)</div></div>
</div>
<div id="status">Your turn</div>
<div id="board"></div>
<div class="btns">
  <button class="btn btn-primary" onclick="newGame()">New Game</button>
  <button class="btn btn-secondary" onclick="resetScores()">Reset</button>
</div>

<script>
const actx=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,t,d){const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(0.12,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}
function placeSound(){tone(440,'sine',0.08);}
function winSound(){[0,80,160,240].forEach((d,i)=>setTimeout(()=>tone(400+i*120,'square',0.15),d));}
function loseSound(){tone(250,'sawtooth',0.2);setTimeout(()=>tone(180,'sawtooth',0.3),150);}
function drawSound(){tone(350,'triangle',0.2);}

let board,turn,over,scores={you:0,ai:0,draw:0};
const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function newGame(){actx.resume();board=Array(9).fill('');turn='X';over=false;document.getElementById('status').textContent='Your turn';render();}

function render(){
  const el=document.getElementById('board');el.innerHTML='';
  board.forEach((v,i)=>{const c=document.createElement('div');c.className='cell'+(v==='X'?' x':v==='O'?' o':'');c.textContent=v;c.onclick=()=>play(i);el.appendChild(c);});
}

function play(i){
  if(board[i]||over||turn!=='X')return;
  board[i]='X';turn='O';placeSound();render();
  const w=checkWin();if(w)return endGame(w);
  if(!board.includes(''))return endGame('draw');
  document.getElementById('status').textContent='AI thinking...';
  setTimeout(aiMove,400);
}

function aiMove(){
  let bestScore=-Infinity,bestMove;
  for(let i=0;i<9;i++){if(board[i])continue;board[i]='O';const s=minimax(board,0,false);board[i]='';if(s>bestScore){bestScore=s;bestMove=i;}}
  board[bestMove]='O';turn='X';placeSound();render();
  const w=checkWin();if(w)return endGame(w);
  if(!board.includes(''))return endGame('draw');
  document.getElementById('status').textContent='Your turn';
}

function minimax(b,d,isMax){
  const w=checkWinFor(b);if(w==='O')return 10-d;if(w==='X')return d-10;if(!b.includes(''))return 0;
  if(isMax){let best=-Infinity;for(let i=0;i<9;i++){if(b[i])continue;b[i]='O';best=Math.max(best,minimax(b,d+1,false));b[i]='';}return best;}
  else{let best=Infinity;for(let i=0;i<9;i++){if(b[i])continue;b[i]='X';best=Math.min(best,minimax(b,d+1,true));b[i]='';}return best;}
}

function checkWinFor(b){for(const[a,bb,cc]of wins){if(b[a]&&b[a]===b[bb]&&b[a]===b[cc])return b[a];}return null;}

function checkWin(){
  for(const[a,b,c]of wins){if(board[a]&&board[a]===board[b]&&board[a]===board[c]){
    const cells=document.querySelectorAll('.cell');cells[a].classList.add('win');cells[b].classList.add('win');cells[c].classList.add('win');return board[a];}}
  return null;
}

function endGame(result){
  over=true;
  if(result==='X'){scores.you++;winSound();document.getElementById('status').textContent='You win! 🎉';}
  else if(result==='O'){scores.ai++;loseSound();document.getElementById('status').textContent='AI wins! 🤖';}
  else{scores.draw++;drawSound();document.getElementById('status').textContent="It's a draw!";}
  document.getElementById('sYou').textContent=scores.you;
  document.getElementById('sAI').textContent=scores.ai;
  document.getElementById('sDraw').textContent=scores.draw;
}

function resetScores(){scores={you:0,ai:0,draw:0};document.getElementById('sYou').textContent=0;document.getElementById('sAI').textContent=0;document.getElementById('sDraw').textContent=0;newGame();}
newGame();
</script>
</body>
</html>
