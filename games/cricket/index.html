<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cricket Star - RehaVerse Games</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;overflow:hidden;touch-action:none;font-family:'Segoe UI',sans-serif}
  canvas{border-radius:10px;max-width:100vw;max-height:100vh;display:block;cursor:pointer}
  #overlay{position:fixed;inset:0;background:rgba(10,10,26,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;color:#fff;text-align:center;padding:20px}
  #overlay h1{font-size:2.3rem;margin-bottom:6px;background:linear-gradient(135deg,#10b981,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  #overlay p{color:#94a3b8;margin-bottom:8px}
  #overlay .res{color:#f59e0b;font-size:1.4rem;font-weight:800;margin-bottom:8px}
  #overlay .hint{font-size:0.82rem;color:#64748b;margin-bottom:18px;max-width:360px;line-height:1.5}
  #overlay button{padding:15px 40px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>🏏 Cricket Star</h1>
  <p>Time your shot perfectly to smash sixes!</p>
  <div class="hint">Tap / click / press SPACE just as the ball reaches the batsman. Perfect timing = SIX! Miss the ball and you're bowled. You have 5 wickets.</div>
  <div class="res" id="ovRes"></div>
  <button onclick="startGame()">Play</button>
</div>
<script>
const actx=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,t,d,v=0.08){const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}
function hitSound(power){tone(300+power*60,'square',0.1);setTimeout(()=>tone(500+power*80,'sine',0.12),40);}
function sixSound(){[0,80,160,240].forEach((d,i)=>setTimeout(()=>tone(500+i*120,'square',0.14),d));}
function outSound(){tone(200,'sawtooth',0.3);setTimeout(()=>tone(110,'sawtooth',0.4),150);}
function bowlSound(){tone(260,'sine',0.08,0.05);}

const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;
function resize(){W=Math.min(window.innerWidth,800);H=Math.min(window.innerHeight,560);c.width=W;c.height=H;}
window.addEventListener('resize',resize);resize();

let runs,wickets,balls,state,ball,batAngle,swinging,resultText,resultTimer,playing,particles;
const MAX_WICKETS=5;

function batsmanX(){return W*0.74;}
function batsmanY(){return H*0.62;}

function startGame(){
  actx.resume();
  runs=0;wickets=0;balls=0;playing=true;particles=[];
  document.getElementById('overlay').style.display='none';
  nextBall();
}

function nextBall(){
  if(wickets>=MAX_WICKETS){endGame();return;}
  state='bowling';
  swinging=false;batAngle=0;resultText='';
  const speed=4.2+Math.random()*2.2+balls*0.02;
  // ball starts near bowler (left), travels to batsman with a bounce
  ball={x:W*0.16,y:H*0.40,vx:speed,bounced:false,hit:false,vy:2.2,done:false,flyVx:0,flyVy:0};
  bowlSound();
}

function swing(){
  if(!playing||state!=='bowling'||swinging)return;
  swinging=true;batAngle=0;
  // Evaluate timing: distance of ball from sweet spot
  const sweetX=batsmanX()-18,sweetY=batsmanY();
  const dx=ball.x-sweetX, dy=ball.y-sweetY;
  const dist=Math.hypot(dx,dy);
  if(dist<32&&!ball.hit){
    // Quality by closeness
    ball.hit=true;
    let power,label;
    if(dist<12){power=6;label='SIX! 🎉';sixSound();}
    else if(dist<19){power=4;label='FOUR! 🔥';hitSound(4);}
    else if(dist<26){power=2;label='Two runs';hitSound(2);}
    else{power=1;label='Single';hitSound(1);}
    runs+=power;
    resultText=label;resultTimer=70;
    // Launch ball
    const ang=(-55-Math.random()*40)*Math.PI/180;
    const sp=6+power*1.6;
    ball.flyVx=Math.cos(ang)*sp*(Math.random()>0.3?1:-0.6);
    ball.flyVy=Math.sin(ang)*sp;
    // spark particles
    for(let i=0;i<14;i++)particles.push({x:ball.x,y:ball.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,life:1,color:power>=4?'#f59e0b':'#fff'});
    balls++;
    setTimeout(()=>{if(playing)nextBall();},1100);
  }else{
    // Mistimed swing — wait to see if bowled
    resultText='';
  }
}

function endGame(){
  playing=false;
  if(runs>(window._cricBest||0))window._cricBest=runs;
  const ov=document.getElementById('overlay');
  ov.querySelector('h1').textContent='🏏 Innings Over!';
  ov.querySelector('p').textContent='All out! Great batting.';
  ov.querySelector('.hint').style.display='none';
  document.getElementById('ovRes').textContent='You scored '+runs+' runs off '+balls+' balls  •  Best: '+(window._cricBest||runs);
  ov.querySelector('button').textContent='Bat Again';
  ov.style.display='flex';
}

function update(){
  if(!playing)return;
  if(state==='bowling'&&ball&&!ball.done){
    if(!ball.hit){
      ball.x+=ball.vx;
      // simple bounce arc
      ball.y+=ball.vy;
      if(!ball.bounced&&ball.y>H*0.66){ball.vy=-Math.abs(ball.vy)*0.55;ball.bounced=true;}
      else ball.vy+=0.18;
      // Reached/passed batsman without being hit
      if(ball.x>batsmanX()+10){
        // bowled if no swing connected
        ball.done=true;state='result';
        wickets++;balls++;outSound();
        resultText='BOWLED! 🎯';resultTimer=80;
        setTimeout(()=>{if(playing)nextBall();},1200);
      }
    }else{
      // flying after hit
      ball.x+=ball.flyVx;ball.y+=ball.flyVy;ball.flyVy+=0.18;
      if(ball.y>H||ball.x<-20||ball.x>W+20)ball.done=true;
    }
  }
  // Bat swing animation
  if(swinging){batAngle+=0.35;if(batAngle>2.2)swinging=false;}
  if(resultTimer>0)resultTimer--;
  // Particles
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life-=0.03;if(p.life<=0)particles.splice(i,1);}
}

function drawStickman(x,y,color,batting){
  ctx.strokeStyle=color;ctx.lineWidth=4;ctx.lineCap='round';
  // head
  ctx.fillStyle=color;ctx.beginPath();ctx.arc(x,y-46,8,0,Math.PI*2);ctx.fill();
  // body
  ctx.beginPath();ctx.moveTo(x,y-38);ctx.lineTo(x,y-14);ctx.stroke();
  // legs
  ctx.beginPath();ctx.moveTo(x,y-14);ctx.lineTo(x-8,y+4);ctx.moveTo(x,y-14);ctx.lineTo(x+8,y+4);ctx.stroke();
  // arms
  if(!batting){ctx.beginPath();ctx.moveTo(x,y-32);ctx.lineTo(x-10,y-22);ctx.moveTo(x,y-32);ctx.lineTo(x+10,y-22);ctx.stroke();}
}

function draw(){
  // Sky
  const sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#2563a8');sky.addColorStop(1,'#5a9fd4');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H*0.5);
  // Field
  const field=ctx.createLinearGradient(0,H*0.4,0,H);field.addColorStop(0,'#2e8b3d');field.addColorStop(1,'#1f6e2c');
  ctx.fillStyle=field;ctx.fillRect(0,H*0.4,W,H*0.6);
  // Field stripes
  ctx.fillStyle='rgba(255,255,255,0.04)';
  for(let i=0;i<8;i++)if(i%2)ctx.fillRect(0,H*0.4+i*((H*0.6)/8),W,(H*0.6)/8);
  // Pitch
  ctx.fillStyle='#c2a878';ctx.beginPath();
  ctx.moveTo(W*0.10,H*0.52);ctx.lineTo(W*0.20,H*0.42);ctx.lineTo(W*0.86,H*0.42);ctx.lineTo(W*0.96,H*0.52);
  ctx.lineTo(W*0.92,H*0.72);ctx.lineTo(W*0.14,H*0.72);ctx.closePath();ctx.fill();

  // Bowler
  drawStickman(W*0.15,H*0.46,'#1e293b',false);
  // Stumps behind batsman
  ctx.strokeStyle='#fcd34d';ctx.lineWidth=3;
  for(let i=-1;i<=1;i++){ctx.beginPath();ctx.moveTo(batsmanX()+20+i*5,batsmanY()-6);ctx.lineTo(batsmanX()+20+i*5,batsmanY()+18);ctx.stroke();}

  // Batsman
  drawStickman(batsmanX(),batsmanY(),'#0f172a',true);
  // Bat (swings)
  ctx.save();
  ctx.translate(batsmanX(),batsmanY()-30);
  const rest=0.5; // resting angle
  ctx.rotate(rest-batAngle);
  ctx.strokeStyle='#1e293b';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,14);ctx.stroke();
  ctx.fillStyle='#d97706';ctx.fillRect(-4,14,8,30);
  ctx.restore();

  // Ball
  if(ball&&!ball.done){
    ctx.fillStyle='#dc2626';ctx.shadowColor='#dc2626';ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(ball.x,ball.y,7,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.beginPath();ctx.arc(ball.x,ball.y,7,0.3,2.8);ctx.stroke();
  }

  // Particles
  particles.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;ctx.fillRect(p.x-2,p.y-2,4,4);ctx.globalAlpha=1;});

  // Result text
  if(resultText&&resultTimer>0){
    ctx.fillStyle=resultText.includes('SIX')?'#f59e0b':resultText.includes('FOUR')?'#10b981':resultText.includes('BOWLED')?'#ef4444':'#fff';
    ctx.font='bold 34px Segoe UI';ctx.textAlign='center';
    ctx.shadowColor='rgba(0,0,0,0.4)';ctx.shadowBlur=8;
    ctx.fillText(resultText,W/2,H*0.26);ctx.shadowBlur=0;
  }

  // Scoreboard
  ctx.fillStyle='rgba(10,10,26,0.65)';ctx.fillRect(W/2-110,12,220,40);
  ctx.fillStyle='#fff';ctx.font='bold 20px Segoe UI';ctx.textAlign='center';
  ctx.fillText(runs+' / '+wickets+'   ('+balls+' balls)',W/2,38);

  // Wickets remaining
  ctx.font='13px Segoe UI';ctx.fillStyle='#94a3b8';ctx.textAlign='left';
  ctx.fillText('Wickets left: '+(MAX_WICKETS-wickets),14,28);
}

function loop(){update();draw();requestAnimationFrame(loop);}
c.addEventListener('click',()=>{playing?swing():startGame();});
c.addEventListener('touchstart',e=>{e.preventDefault();playing?swing():startGame();});
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();playing?swing():startGame();}});

runs=0;wickets=0;balls=0;playing=false;particles=[];ball=null;resultText='';resultTimer=0;
loop();
</script>
</body>
</html>
