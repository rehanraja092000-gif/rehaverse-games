<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake - RehaVerse Games</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;font-family:'Segoe UI',sans-serif;color:#fff;overflow:hidden;touch-action:none}
  .hud{display:flex;gap:24px;margin-bottom:10px;font-size:1rem}
  .hud span{color:#a855f7;font-weight:700}
  canvas{border:2px solid #7c3aed;border-radius:8px;background:#12122a;max-width:100vw;max-height:70vh}
  #controls{display:none;margin-top:12px;gap:6px}
  .cbtn{width:56px;height:56px;background:#1a1a3e;border:2px solid #7c3aed;border-radius:12px;color:#fff;font-size:1.6rem;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
  .cbtn:active{background:#7c3aed}
  .crow{display:flex;gap:6px;justify-content:center}
  #overlay{position:fixed;inset:0;background:rgba(10,10,26,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10}
  #overlay h2{font-size:2.2rem;margin-bottom:6px}
  #overlay .sub{color:#a855f7;font-size:1.2rem;margin-bottom:20px}
  #overlay button{padding:14px 32px;background:#7c3aed;color:#fff;border:none;border-radius:10px;font-size:1.1rem;font-weight:700;cursor:pointer}
  #overlay button:hover{background:#6d28d9}
  @media(max-width:768px){#controls{display:flex;flex-direction:column;align-items:center}}
  @media(min-width:769px){canvas{max-height:80vh}}
</style>
</head>
<body>
<div class="hud">Score: <span id="sc">0</span>&nbsp;&nbsp;Best: <span id="best">0</span></div>
<canvas id="c"></canvas>
<div id="controls">
  <div class="crow"><button class="cbtn" ontouchstart="setDir(0,-1)" onclick="setDir(0,-1)">▲</button></div>
  <div class="crow">
    <button class="cbtn" ontouchstart="setDir(-1,0)" onclick="setDir(-1,0)">◀</button>
    <button class="cbtn" ontouchstart="setDir(0,1)" onclick="setDir(0,1)">▼</button>
    <button class="cbtn" ontouchstart="setDir(1,0)" onclick="setDir(1,0)">▶</button>
  </div>
</div>
<div id="overlay">
  <h2>🐍 Snake</h2>
  <p class="sub">Use arrow keys or swipe to play</p>
  <button onclick="startGame()">Play</button>
</div>

<script>
// Audio
const actx=new(window.AudioContext||window.webkitAudioContext)();
function playSound(freq,type,dur){const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(0.15,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+dur);o.start();o.stop(actx.currentTime+dur);}
function eatSound(){playSound(600,'square',0.1);setTimeout(()=>playSound(800,'square',0.15),80);}
function dieSound(){playSound(200,'sawtooth',0.3);setTimeout(()=>playSound(100,'sawtooth',0.4),150);}

const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
let SIZE,GRID=20,CELL,snake,food,dx,dy,ndx,ndy,score,bestScore=0,interval,running;

function resize(){
  SIZE=Math.min(window.innerWidth-24,window.innerHeight*0.7,560);
  SIZE=Math.floor(SIZE/GRID)*GRID;
  canvas.width=canvas.height=SIZE;CELL=SIZE/GRID;
  if(running)draw();
}
window.addEventListener('resize',resize);resize();

function startGame(){
  actx.resume();
  document.getElementById('overlay').style.display='none';
  snake=[{x:10,y:10}];ndx=dx=1;ndy=dy=0;score=0;
  document.getElementById('sc').textContent=0;
  placeFood();running=true;
  if(interval)clearInterval(interval);
  interval=setInterval(tick,110);
}

function placeFood(){do{food={x:Math.floor(Math.random()*GRID),y:Math.floor(Math.random()*GRID)};}while(snake.some(s=>s.x===food.x&&s.y===food.y));}

function tick(){
  if(!running)return;
  dx=ndx;dy=ndy;
  const head={x:snake[0].x+dx,y:snake[0].y+dy};
  if(head.x<0||head.x>=GRID||head.y<0||head.y>=GRID||snake.some(s=>s.x===head.x&&s.y===head.y)){
    running=false;clearInterval(interval);dieSound();
    if(score>bestScore){bestScore=score;document.getElementById('best').textContent=bestScore;}
    document.getElementById('overlay').querySelector('h2').textContent='Game Over!';
    document.getElementById('overlay').querySelector('.sub').textContent='Score: '+score;
    document.getElementById('overlay').querySelector('button').textContent='Play Again';
    document.getElementById('overlay').style.display='flex';return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){score+=10;document.getElementById('sc').textContent=score;eatSound();placeFood();}
  else snake.pop();
  draw();
}

function draw(){
  ctx.fillStyle='#12122a';ctx.fillRect(0,0,SIZE,SIZE);
  ctx.strokeStyle='#1a1a3e';ctx.lineWidth=0.5;
  for(let i=0;i<=GRID;i++){ctx.beginPath();ctx.moveTo(i*CELL,0);ctx.lineTo(i*CELL,SIZE);ctx.stroke();ctx.beginPath();ctx.moveTo(0,i*CELL);ctx.lineTo(SIZE,i*CELL);ctx.stroke();}
  // Food glow
  ctx.shadowColor='#ef4444';ctx.shadowBlur=12;
  ctx.fillStyle='#ef4444';ctx.beginPath();ctx.arc(food.x*CELL+CELL/2,food.y*CELL+CELL/2,CELL/2.5,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // Snake
  snake.forEach((s,i)=>{
    const g=ctx.createLinearGradient(s.x*CELL,s.y*CELL,s.x*CELL+CELL,s.y*CELL+CELL);
    g.addColorStop(0,i===0?'#a855f7':'#7c3aed');g.addColorStop(1,i===0?'#ec4899':'#6d28d9');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.roundRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2,4);ctx.fill();
  });
}

function setDir(x,y){if(!(x===-dx&&y===-dy)){ndx=x;ndy=y;}}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp'){e.preventDefault();setDir(0,-1);}
  else if(e.key==='ArrowDown'){e.preventDefault();setDir(0,1);}
  else if(e.key==='ArrowLeft')setDir(-1,0);
  else if(e.key==='ArrowRight')setDir(1,0);
});

let tx,ty;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;});
canvas.addEventListener('touchend',e=>{const ex=e.changedTouches[0].clientX-tx,ey=e.changedTouches[0].clientY-ty;if(Math.abs(ex)>Math.abs(ey))setDir(ex>0?1:-1,0);else setDir(0,ey>0?1:-1);});
</script>
</body>
</html>
