<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hill Climb Truck - RehaVerse Games</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a1a;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden;touch-action:none;font-family:'Segoe UI',sans-serif}
  canvas{border-radius:10px;max-width:100vw;max-height:100vh;display:block}
  .pedals{position:fixed;bottom:18px;left:0;right:0;display:none;justify-content:space-between;padding:0 18px;z-index:10;pointer-events:none}
  .pedal{width:120px;height:90px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;color:#fff;border:2px solid rgba(255,255,255,0.25);pointer-events:auto;-webkit-tap-highlight-color:transparent;user-select:none}
  .brake{background:linear-gradient(135deg,#ef4444,#b91c1c)}
  .gas{background:linear-gradient(135deg,#10b981,#047857)}
  .pedal:active{filter:brightness(1.3)}
  @media(max-width:820px){.pedals{display:flex}}
  #overlay{position:fixed;inset:0;background:rgba(10,10,26,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;color:#fff;text-align:center;padding:20px}
  #overlay h1{font-size:2.2rem;margin-bottom:6px;background:linear-gradient(135deg,#10b981,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  #overlay p{color:#94a3b8;margin-bottom:8px}
  #overlay .res{color:#f59e0b;font-size:1.4rem;font-weight:800;margin-bottom:8px}
  #overlay .hint{font-size:0.82rem;color:#64748b;margin-bottom:18px}
  #overlay button{padding:15px 40px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="pedals">
  <div class="pedal brake" ontouchstart="brakeOn=true" ontouchend="brakeOn=false">◀ BRAKE</div>
  <div class="pedal gas" ontouchstart="gasOn=true" ontouchend="gasOn=false">GAS ▶</div>
</div>
<div id="overlay">
  <h1>🚚 Hill Climb Truck</h1>
  <p>Drive as far as you can without flipping or running out of fuel!</p>
  <div class="res" id="ovRes"></div>
  <div class="hint">Gas = → or D • Brake/Reverse = ← or A • Collect ⛽ fuel and 🪙 coins</div>
  <button onclick="startGame()">Drive</button>
</div>
<script>
const actx=new(window.AudioContext||window.webkitAudioContext)();
let engineOsc=null,engineGain=null;
function startEngine(){
  if(engineOsc)return;
  engineOsc=actx.createOscillator();engineGain=actx.createGain();
  engineOsc.type='sawtooth';engineOsc.frequency.value=40;
  engineGain.gain.value=0.0;
  engineOsc.connect(engineGain);engineGain.connect(actx.destination);engineOsc.start();
}
function tone(f,t,d,v=0.08){const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}
function coinSound(){tone(800,'square',0.06);setTimeout(()=>tone(1100,'square',0.08),50);}
function fuelSound(){tone(500,'sine',0.1);setTimeout(()=>tone(700,'sine',0.12),80);}
function crashSound(){tone(180,'sawtooth',0.35);setTimeout(()=>tone(90,'sawtooth',0.45),140);}

const c=document.getElementById('c'),ctx=c.getContext('2d');
let W,H;
function resize(){W=Math.min(window.innerWidth,900);H=Math.min(window.innerHeight,600);c.width=W;c.height=H;}
window.addEventListener('resize',resize);resize();

// Terrain
let terrain=[];const SEG=14; // px between sample points
function heightAt(x){
  // smooth procedural hills using layered sines
  const base=H*0.72;
  return base
    + Math.sin(x*0.0040)*70
    + Math.sin(x*0.0011+1.3)*130
    + Math.sin(x*0.013+0.7)*22;
}
let gasOn=false,brakeOn=false,keys={};
let truck,coins,fuels,distance,score,best=0,playing,camX;

function resetTruck(){
  truck={x:200,y:heightAt(200)-40,vx:0,vy:0,angle:0,angVel:0,onGround:true,fuel:100,wheelBase:60,flipped:false};
}

function buildPickups(){
  coins=[];fuels=[];
  for(let x=600;x<60000;x+=Math.random()*500+300){
    if(Math.random()<0.75){
      const n=2+Math.floor(Math.random()*4);
      for(let i=0;i<n;i++)coins.push({x:x+i*34,got:false});
    }
  }
  for(let x=1500;x<60000;x+=Math.random()*2500+1800){
    fuels.push({x,got:false});
  }
}

function startGame(){
  actx.resume();startEngine();
  resetTruck();buildPickups();
  distance=0;score=0;playing=true;camX=0;
  document.getElementById('overlay').style.display='none';
}

function endGame(reason){
  playing=false;crashSound();
  if(engineGain)engineGain.gain.value=0;
  const total=Math.floor(distance/10)+score;
  if(total>best)best=total;
  const ov=document.getElementById('overlay');
  ov.querySelector('h1').textContent=truck.flipped?'💥 Flipped Over!':'⛽ Out of Fuel!';
  ov.querySelector('p').textContent=reason;
  document.getElementById('ovRes').textContent='Distance: '+Math.floor(distance/10)+'m  •  Coins: '+score+'  •  Best: '+best;
  ov.querySelector('button').textContent='Drive Again';
  ov.style.display='flex';
}

function update(){
  if(!playing)return;
  const gas=gasOn||keys['ArrowRight']||keys['KeyD'];
  const brake=brakeOn||keys['ArrowLeft']||keys['KeyA'];
  const hasFuel=truck.fuel>0;

  // Wheel ground sampling
  const fwX=truck.x+Math.cos(truck.angle)*truck.wheelBase/2;
  const rwX=truck.x-Math.cos(truck.angle)*truck.wheelBase/2;
  const gFront=heightAt(fwX);
  const gRear=heightAt(rwX);
  const groundCenter=(gFront+gRear)/2;
  const slope=Math.atan2(gFront-gRear,truck.wheelBase);

  const rideH=40;
  const carBottom=truck.y+rideH;

  // Determine ground contact
  if(carBottom>=groundCenter-2){
    // On ground
    truck.onGround=true;
    truck.y=groundCenter-rideH;
    // settle angle toward slope
    truck.angle+=(slope-truck.angle)*0.18;
    truck.vy=0;

    // engine / gravity along slope
    if(gas&&hasFuel){truck.vx+=Math.cos(slope)*0.45;truck.angVel-=0.006;truck.fuel-=0.07;}
    if(brake&&hasFuel){truck.vx-=Math.cos(slope)*0.32;truck.angVel+=0.004;truck.fuel-=0.04;}
    // gravity pulls along slope
    truck.vx-=Math.sin(slope)*0.32;
    // rolling resistance
    truck.vx*=0.985;
    truck.x+=truck.vx;

    // wheelie / pitch from acceleration
    truck.angle+=truck.angVel;
    truck.angVel*=0.9;

    // launch off sharp drops
    const aheadGround=heightAt(truck.x+truck.vx*2);
    if(truck.vx>3&&aheadGround>groundCenter+30){
      truck.onGround=false;truck.vy=-truck.vx*0.25;
    }
  }else{
    // Airborne
    truck.onGround=false;
    truck.vy+=0.55; // gravity
    truck.x+=truck.vx;
    truck.y+=truck.vy;
    // air control
    if(gas)truck.angVel-=0.004;
    if(brake)truck.angVel+=0.004;
    truck.angle+=truck.angVel;
    truck.angVel*=0.98;
    // landing
    if(truck.y+rideH>=groundCenter){
      truck.y=groundCenter-rideH;
      const landDiff=Math.abs(((truck.angle-slope+Math.PI)%(Math.PI*2))-Math.PI);
      if(landDiff>1.2){truck.flipped=true;endGame('You landed on the roof!');return;}
      truck.vy=0;truck.angVel*=0.3;tone(220,'triangle',0.05);
    }
  }

  // Flip check
  const norm=((truck.angle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  if(norm>1.9&&norm<Math.PI*2-1.9){truck.flipped=true;endGame('The truck flipped over!');return;}

  // Distance & fuel-out
  distance=Math.max(distance,truck.x-200);
  if(truck.fuel<=0&&Math.abs(truck.vx)<0.3){endGame('You ran out of fuel!');return;}
  if(truck.fuel<0)truck.fuel=0;

  // Engine sound
  if(engineGain){
    const target=(gas&&hasFuel)?0.05:0.015;
    engineGain.gain.value+=(target-engineGain.gain.value)*0.1;
    engineOsc.frequency.value=45+Math.min(Math.abs(truck.vx)*14,160);
  }

  // Pickups
  coins.forEach(co=>{
    if(co.got)return;
    const cy=heightAt(co.x)-55;
    if(Math.abs(co.x-truck.x)<28&&Math.abs(cy-truck.y)<60){co.got=true;score++;coinSound();}
  });
  fuels.forEach(f=>{
    if(f.got)return;
    if(Math.abs(f.x-truck.x)<34){f.got=true;truck.fuel=Math.min(100,truck.fuel+45);fuelSound();}
  });

  camX=truck.x-W*0.32;
}

function drawWheel(wx,wy,r){
  ctx.fillStyle='#1f2937';ctx.beginPath();ctx.arc(wx,wy,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0f172a';ctx.beginPath();ctx.arc(wx,wy,r*0.55,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#475569';ctx.lineWidth=2;
  for(let i=0;i<6;i++){const a=truck.x*0.02+i*Math.PI/3;ctx.beginPath();ctx.moveTo(wx,wy);ctx.lineTo(wx+Math.cos(a)*r*0.5,wy+Math.sin(a)*r*0.5);ctx.stroke();}
}

function draw(){
  // Sky
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#1e3a5f');sky.addColorStop(0.5,'#2d4a6b');sky.addColorStop(1,'#1a2942');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  // Sun
  ctx.fillStyle='rgba(245,200,120,0.5)';ctx.beginPath();ctx.arc(W*0.8,H*0.2,40,0,Math.PI*2);ctx.fill();
  // Distant hills (parallax)
  ctx.fillStyle='rgba(100,130,160,0.3)';
  ctx.beginPath();ctx.moveTo(0,H);
  for(let x=0;x<=W;x+=20){const wx=x+camX*0.3;ctx.lineTo(x,H*0.55+Math.sin(wx*0.002)*40+Math.sin(wx*0.005)*20);}
  ctx.lineTo(W,H);ctx.fill();

  // Terrain
  ctx.beginPath();ctx.moveTo(-SEG,H);
  for(let sx=-SEG;sx<=W+SEG;sx+=SEG){
    const worldX=sx+camX;
    ctx.lineTo(sx,heightAt(worldX));
  }
  ctx.lineTo(W+SEG,H);ctx.closePath();
  const grd=ctx.createLinearGradient(0,H*0.5,0,H);
  grd.addColorStop(0,'#15803d');grd.addColorStop(0.15,'#166534');grd.addColorStop(1,'#14532d');
  ctx.fillStyle=grd;ctx.fill();
  // Grass top line
  ctx.beginPath();
  for(let sx=-SEG;sx<=W+SEG;sx+=SEG){const worldX=sx+camX;const yy=heightAt(worldX);sx===-SEG?ctx.moveTo(sx,yy):ctx.lineTo(sx,yy);}
  ctx.strokeStyle='#22c55e';ctx.lineWidth=4;ctx.stroke();

  // Pickups
  coins.forEach(co=>{if(co.got)return;const sx=co.x-camX;if(sx<-40||sx>W+40)return;const sy=heightAt(co.x)-55;
    ctx.fillStyle='#f59e0b';ctx.shadowColor='#f59e0b';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(sx,sy,11,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.fillStyle='#fbbf24';ctx.font='bold 12px Segoe UI';ctx.textAlign='center';ctx.fillText('$',sx,sy+4);});
  fuels.forEach(f=>{if(f.got)return;const sx=f.x-camX;if(sx<-40||sx>W+40)return;const sy=heightAt(f.x)-58;
    ctx.fillStyle='#ef4444';ctx.fillRect(sx-10,sy-12,20,24);ctx.fillStyle='#fff';ctx.font='14px Segoe UI';ctx.textAlign='center';ctx.fillText('⛽',sx,sy+5);});

  // Truck
  const tx=truck.x-camX,ty=truck.y;
  ctx.save();ctx.translate(tx,ty);ctx.rotate(truck.angle);
  // wheels
  drawWheel(-truck.wheelBase/2,18,16);
  drawWheel(truck.wheelBase/2,18,16);
  // body
  const bg=ctx.createLinearGradient(0,-20,0,20);bg.addColorStop(0,'#f59e0b');bg.addColorStop(1,'#d97706');
  ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(-truck.wheelBase/2-6,-8,truck.wheelBase+12,26,6);ctx.fill();
  // cabin
  ctx.fillStyle='#1e3a5f';ctx.beginPath();ctx.roundRect(2,-26,26,22,5);ctx.fill();
  ctx.fillStyle='#7dd3fc';ctx.beginPath();ctx.roundRect(6,-22,17,12,3);ctx.fill();
  // cargo
  ctx.fillStyle='#b45309';ctx.fillRect(-truck.wheelBase/2-2,-16,30,12);
  ctx.restore();

  // HUD
  ctx.fillStyle='rgba(10,10,26,0.55)';ctx.fillRect(10,10,160,72);
  ctx.fillStyle='#fff';ctx.font='bold 15px Segoe UI';ctx.textAlign='left';
  ctx.fillText('Distance: '+Math.floor(distance/10)+'m',20,32);
  ctx.fillText('Coins: '+score,20,52);
  // fuel bar
  ctx.fillStyle='#334155';ctx.fillRect(20,62,140,10);
  ctx.fillStyle=truck.fuel>25?'#10b981':'#ef4444';ctx.fillRect(20,62,140*(truck.fuel/100),10);
  ctx.fillStyle='#fff';ctx.font='9px Segoe UI';ctx.fillText('FUEL',22,71);
}

function loop(){update();draw();requestAnimationFrame(loop);}

document.addEventListener('keydown',e=>{keys[e.code]=true;if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
c.addEventListener('click',()=>{if(!playing){startGame();}});

resetTruck();buildPickups();distance=0;score=0;playing=false;camX=0;
loop();
</script>
</body>
</html>
