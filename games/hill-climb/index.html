<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hill Climb Racing - RehaVerse Games</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#0a0a1a;overflow:hidden;touch-action:none;font-family:'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center}
  canvas{border-radius:10px;max-width:100vw;max-height:100vh;display:block}
  .pedals{position:fixed;bottom:18px;left:0;right:0;display:none;justify-content:space-between;padding:0 18px;z-index:10;pointer-events:none}
  .pedal{width:120px;height:90px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;color:#fff;border:2px solid rgba(255,255,255,0.25);pointer-events:auto;-webkit-tap-highlight-color:transparent;user-select:none}
  .brake{background:linear-gradient(135deg,#ef4444,#b91c1c)}
  .gas{background:linear-gradient(135deg,#10b981,#047857)}
  .pedal:active{filter:brightness(1.3)}
  @media(max-width:820px){.pedals{display:flex}}
  .screen{position:fixed;inset:0;background:rgba(10,10,26,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;color:#fff;text-align:center;padding:20px}
  .screen h1{font-size:2.1rem;margin-bottom:8px;background:linear-gradient(135deg,#10b981,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .screen p{color:#94a3b8;margin-bottom:10px}
  .screen .res{color:#f59e0b;font-size:1.3rem;font-weight:800;margin-bottom:8px}
  .screen .hint{font-size:0.8rem;color:#64748b;margin-bottom:16px}
  .vehicles{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:18px;max-width:460px}
  .vpick{background:#1a1a3e;border:2px solid #2a2a5a;border-radius:12px;padding:10px;cursor:pointer;width:130px;transition:all 0.15s}
  .vpick:hover{border-color:#10b981;transform:translateY(-2px)}
  .vpick.sel{border-color:#f59e0b;background:#24245a}
  .vpick canvas{width:106px;height:54px;margin-bottom:6px;border-radius:6px;background:#0e1530}
  .vpick .nm{font-weight:700;font-size:0.82rem}
  .vpick .st{font-size:0.62rem;color:#94a3b8;margin-top:2px}
  .btn{padding:14px 40px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;border:none;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="pedals">
  <div class="pedal brake" id="brakeBtn">◀ BRAKE</div>
  <div class="pedal gas" id="gasBtn">GAS ▶</div>
</div>
<div class="screen" id="startScreen">
  <h1>🚚 Hill Climb Racing</h1>
  <p>Pick a vehicle and drive as far as you can without flipping!</p>
  <div class="vehicles" id="vehiclePicker"></div>
  <div class="hint">Gas = → / D • Brake-Reverse = ← / A • Grab ⛽ fuel and 🪙 coins</div>
  <button class="btn" onclick="startGame()">Drive</button>
</div>
<div class="screen" id="overScreen" style="display:none">
  <h1>💥 Crashed!</h1>
  <p id="overMsg">You flipped over.</p>
  <div class="res" id="ovRes"></div>
  <button class="btn" onclick="showStart()">Drive Again</button>
</div>
<script>
(function(){
"use strict";
var actx=new (window.AudioContext||window.webkitAudioContext)();
var eng=null,engG=null;
function startEngine(){if(eng)return;eng=actx.createOscillator();engG=actx.createGain();eng.type='sawtooth';eng.frequency.value=40;engG.gain.value=0;eng.connect(engG);engG.connect(actx.destination);eng.start();}
function tone(f,t,d,v){v=v||0.08;var o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}
function coinSound(){tone(800,'square',0.06);setTimeout(function(){tone(1100,'square',0.08);},50);}
function fuelSound(){tone(500,'sine',0.1);setTimeout(function(){tone(700,'sine',0.12);},80);}
function crashSound(){tone(180,'sawtooth',0.35);setTimeout(function(){tone(90,'sawtooth',0.45);},140);}

// Vehicles: accel, fuelCap, wheelBase, wheelR, bodyColor, cabColor, cargoColor, style
var VEHICLES=[
  {name:'Pickup',color:0xf59e0b,accel:0.45,fuelCap:100,wheelBase:60,wheelR:16,bodyCol:'#f59e0b',darkCol:'#d97706',cab:'#1e3a5f',desc:'Balanced'},
  {name:'Monster',color:0x10b981,accel:0.42,fuelCap:130,wheelBase:66,wheelR:24,bodyCol:'#10b981',darkCol:'#047857',cab:'#064e3b',desc:'Big grip'},
  {name:'Jeep',color:0x3b82f6,accel:0.5,fuelCap:90,wheelBase:54,wheelR:17,bodyCol:'#3b82f6',darkCol:'#1d4ed8',cab:'#1e3a8a',desc:'Climber'},
  {name:'Racer',color:0xef4444,accel:0.6,fuelCap:80,wheelBase:58,wheelR:13,bodyCol:'#ef4444',darkCol:'#b91c1c',cab:'#7f1d1d',desc:'Fast/low'}
];
var chosen=0;

var c=document.getElementById('c'),ctx=c.getContext('2d');
var W,H;
function resize(){W=Math.min(window.innerWidth,900);H=Math.min(window.innerHeight,600);c.width=W;c.height=H;}
window.addEventListener('resize',resize);resize();

var SEG=14;
function heightAt(x){var base=H*0.72;return base+Math.sin(x*0.0040)*70+Math.sin(x*0.0011+1.3)*130+Math.sin(x*0.013+0.7)*22;}

var gasOn=false,brakeOn=false,keys={};
var truck,coins,fuels,distance,score,best=0,playing,camX,V;

function resetTruck(){V=VEHICLES[chosen];truck={x:200,y:heightAt(200)-40,vx:0,vy:0,angle:0,angVel:0,onGround:true,fuel:V.fuelCap,fuelCap:V.fuelCap,wheelBase:V.wheelBase,flipped:false};}

function buildPickups(){
  coins=[];fuels=[];
  var x;
  for(x=600;x<60000;x+=Math.random()*500+300){if(Math.random()<0.75){var n=2+Math.floor(Math.random()*4);for(var i=0;i<n;i++)coins.push({x:x+i*34,got:false});}}
  for(x=1500;x<60000;x+=Math.random()*2500+1800){fuels.push({x:x,got:false});}
}

window.startGame=function(){actx.resume();startEngine();resetTruck();buildPickups();distance=0;score=0;playing=true;camX=0;document.getElementById('startScreen').style.display='none';document.getElementById('overScreen').style.display='none';};
window.showStart=function(){document.getElementById('overScreen').style.display='none';document.getElementById('startScreen').style.display='flex';};

function endGame(reason){
  playing=false;crashSound();if(engG)engG.gain.value=0;
  var total=Math.floor(distance/10)+score;
  if(total>best)best=total;
  document.getElementById('overScreen').querySelector('h1').textContent=truck.flipped?'💥 Flipped Over!':'⛽ Out of Fuel!';
  document.getElementById('overMsg').textContent=reason;
  document.getElementById('ovRes').textContent='Distance: '+Math.floor(distance/10)+'m  •  Coins: '+score+'  •  Best: '+best;
  document.getElementById('overScreen').style.display='flex';
}

function update(){
  if(!playing)return;
  var gas=gasOn||keys['ArrowRight']||keys['KeyD'];
  var brake=brakeOn||keys['ArrowLeft']||keys['KeyA'];
  var hasFuel=truck.fuel>0;
  var fwX=truck.x+Math.cos(truck.angle)*truck.wheelBase/2;
  var rwX=truck.x-Math.cos(truck.angle)*truck.wheelBase/2;
  var gFront=heightAt(fwX),gRear=heightAt(rwX);
  var groundCenter=(gFront+gRear)/2;
  var slope=Math.atan2(gFront-gRear,truck.wheelBase);
  var rideH=40;
  var carBottom=truck.y+rideH;

  if(carBottom>=groundCenter-2){
    truck.onGround=true;truck.y=groundCenter-rideH;
    truck.angle+=(slope-truck.angle)*0.18;truck.vy=0;
    if(gas&&hasFuel){truck.vx+=Math.cos(slope)*V.accel;truck.angVel-=0.006;truck.fuel-=0.07;}
    if(brake&&hasFuel){truck.vx-=Math.cos(slope)*0.32;truck.angVel+=0.004;truck.fuel-=0.04;}
    truck.vx-=Math.sin(slope)*0.32;truck.vx*=0.985;truck.x+=truck.vx;
    truck.angle+=truck.angVel;truck.angVel*=0.9;
    var aheadGround=heightAt(truck.x+truck.vx*2);
    if(truck.vx>3&&aheadGround>groundCenter+30){truck.onGround=false;truck.vy=-truck.vx*0.25;}
  }else{
    truck.onGround=false;truck.vy+=0.55;truck.x+=truck.vx;truck.y+=truck.vy;
    if(gas)truck.angVel-=0.004;if(brake)truck.angVel+=0.004;
    truck.angle+=truck.angVel;truck.angVel*=0.98;
    if(truck.y+rideH>=groundCenter){
      truck.y=groundCenter-rideH;
      var landDiff=Math.abs(((truck.angle-slope+Math.PI)%(Math.PI*2))-Math.PI);
      if(landDiff>1.2){truck.flipped=true;endGame('You landed on the roof!');return;}
      truck.vy=0;truck.angVel*=0.3;tone(220,'triangle',0.05);
    }
  }
  var norm=((truck.angle%(Math.PI*2))+Math.PI*2)%(Math.PI*2);
  if(norm>1.9&&norm<Math.PI*2-1.9){truck.flipped=true;endGame('The vehicle flipped over!');return;}
  distance=Math.max(distance,truck.x-200);
  if(truck.fuel<=0&&Math.abs(truck.vx)<0.3){endGame('You ran out of fuel!');return;}
  if(truck.fuel<0)truck.fuel=0;
  if(engG){var target=(gas&&hasFuel)?0.05:0.015;engG.gain.value+=(target-engG.gain.value)*0.1;eng.frequency.value=45+Math.min(Math.abs(truck.vx)*14,160);}
  coins.forEach(function(co){if(co.got)return;var cy=heightAt(co.x)-55;if(Math.abs(co.x-truck.x)<28&&Math.abs(cy-truck.y)<60){co.got=true;score++;coinSound();}});
  fuels.forEach(function(f){if(f.got)return;if(Math.abs(f.x-truck.x)<34){f.got=true;truck.fuel=Math.min(truck.fuelCap,truck.fuel+45);fuelSound();}});
  camX=truck.x-W*0.32;
}

function drawWheel(wx,wy,r){
  ctx.fillStyle='#1f2937';ctx.beginPath();ctx.arc(wx,wy,r,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#0f172a';ctx.beginPath();ctx.arc(wx,wy,r*0.55,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#475569';ctx.lineWidth=2;
  for(var i=0;i<6;i++){var a=truck.x*0.02+i*Math.PI/3;ctx.beginPath();ctx.moveTo(wx,wy);ctx.lineTo(wx+Math.cos(a)*r*0.5,wy+Math.sin(a)*r*0.5);ctx.stroke();}
}

function drawVehicle(){
  var tx=truck.x-camX,ty=truck.y;
  ctx.save();ctx.translate(tx,ty);ctx.rotate(truck.angle);
  drawWheel(-truck.wheelBase/2,18,V.wheelR);
  drawWheel(truck.wheelBase/2,18,V.wheelR);
  var bg=ctx.createLinearGradient(0,-20,0,20);bg.addColorStop(0,V.bodyCol);bg.addColorStop(1,V.darkCol);
  ctx.fillStyle=bg;
  if(V.name==='Racer'){
    ctx.beginPath();ctx.roundRect(-truck.wheelBase/2-6,-2,truck.wheelBase+12,20,6);ctx.fill();
    ctx.fillStyle=V.cab;ctx.beginPath();ctx.roundRect(-6,-16,30,16,5);ctx.fill();
    ctx.fillStyle='#7dd3fc';ctx.beginPath();ctx.roundRect(-2,-13,20,9,3);ctx.fill();
    ctx.fillStyle=V.darkCol;ctx.fillRect(truck.wheelBase/2-10,-8,12,4); // spoiler
  }else{
    ctx.beginPath();ctx.roundRect(-truck.wheelBase/2-6,-8,truck.wheelBase+12,26,6);ctx.fill();
    ctx.fillStyle=V.cab;ctx.beginPath();ctx.roundRect(2,-26,26,22,5);ctx.fill();
    ctx.fillStyle='#7dd3fc';ctx.beginPath();ctx.roundRect(6,-22,17,12,3);ctx.fill();
    ctx.fillStyle=V.darkCol;ctx.fillRect(-truck.wheelBase/2-2,-16,30,12);
  }
  ctx.restore();
}

function draw(){
  var sky=ctx.createLinearGradient(0,0,0,H);sky.addColorStop(0,'#1e3a5f');sky.addColorStop(0.5,'#2d4a6b');sky.addColorStop(1,'#1a2942');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(245,200,120,0.5)';ctx.beginPath();ctx.arc(W*0.8,H*0.2,40,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(100,130,160,0.3)';ctx.beginPath();ctx.moveTo(0,H);
  for(var x=0;x<=W;x+=20){var wx=x+camX*0.3;ctx.lineTo(x,H*0.55+Math.sin(wx*0.002)*40+Math.sin(wx*0.005)*20);}
  ctx.lineTo(W,H);ctx.fill();
  ctx.beginPath();ctx.moveTo(-SEG,H);
  for(var sx=-SEG;sx<=W+SEG;sx+=SEG){var worldX=sx+camX;ctx.lineTo(sx,heightAt(worldX));}
  ctx.lineTo(W+SEG,H);ctx.closePath();
  var grd=ctx.createLinearGradient(0,H*0.5,0,H);grd.addColorStop(0,'#15803d');grd.addColorStop(0.15,'#166534');grd.addColorStop(1,'#14532d');
  ctx.fillStyle=grd;ctx.fill();
  ctx.beginPath();
  for(var sx2=-SEG;sx2<=W+SEG;sx2+=SEG){var wx2=sx2+camX;var yy=heightAt(wx2);sx2===-SEG?ctx.moveTo(sx2,yy):ctx.lineTo(sx2,yy);}
  ctx.strokeStyle='#22c55e';ctx.lineWidth=4;ctx.stroke();
  coins.forEach(function(co){if(co.got)return;var sx=co.x-camX;if(sx<-40||sx>W+40)return;var sy=heightAt(co.x)-55;ctx.fillStyle='#f59e0b';ctx.shadowColor='#f59e0b';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(sx,sy,11,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#fbbf24';ctx.font='bold 12px Segoe UI';ctx.textAlign='center';ctx.fillText('$',sx,sy+4);});
  fuels.forEach(function(f){if(f.got)return;var sx=f.x-camX;if(sx<-40||sx>W+40)return;var sy=heightAt(f.x)-58;ctx.fillStyle='#ef4444';ctx.fillRect(sx-10,sy-12,20,24);ctx.fillStyle='#fff';ctx.font='14px Segoe UI';ctx.textAlign='center';ctx.fillText('⛽',sx,sy+5);});
  drawVehicle();
  ctx.fillStyle='rgba(10,10,26,0.55)';ctx.fillRect(10,10,160,72);
  ctx.fillStyle='#fff';ctx.font='bold 15px Segoe UI';ctx.textAlign='left';
  ctx.fillText('Distance: '+Math.floor(distance/10)+'m',20,32);
  ctx.fillText('Coins: '+score,20,52);
  ctx.fillStyle='#334155';ctx.fillRect(20,62,140,10);
  ctx.fillStyle=truck.fuel>truck.fuelCap*0.25?'#10b981':'#ef4444';ctx.fillRect(20,62,140*(truck.fuel/truck.fuelCap),10);
  ctx.fillStyle='#fff';ctx.font='9px Segoe UI';ctx.fillText('FUEL',22,71);
}

function loop(){update();draw();requestAnimationFrame(loop);}

// vehicle picker thumbnails
(function(){
  var picker=document.getElementById('vehiclePicker');
  VEHICLES.forEach(function(v,idx){
    var d=document.createElement('div');d.className='vpick'+(idx===0?' sel':'');
    var cv=document.createElement('canvas');cv.width=106;cv.height=54;
    var x=cv.getContext('2d');
    // draw mini vehicle
    x.fillStyle=v.darkCol;x.beginPath();x.arc(32,40,v.wheelR*0.6,0,Math.PI*2);x.arc(74,40,v.wheelR*0.6,0,Math.PI*2);x.fill();
    x.fillStyle='#111';x.beginPath();x.arc(32,40,v.wheelR*0.6,0,Math.PI*2);x.arc(74,40,v.wheelR*0.6,0,Math.PI*2);x.fill();
    x.fillStyle=v.bodyCol;
    if(v.name==='Racer'){x.fillRect(22,28,62,10);x.fillStyle=v.cab;x.fillRect(40,18,26,12);}
    else{x.fillRect(20,24,66,14);x.fillStyle=v.cab;x.fillRect(56,12,22,14);}
    var nm=document.createElement('div');nm.className='nm';nm.textContent=v.name;
    var st=document.createElement('div');st.className='st';st.textContent=v.desc;
    d.appendChild(cv);d.appendChild(nm);d.appendChild(st);
    d.onclick=function(){chosen=idx;document.querySelectorAll('.vpick').forEach(function(e){e.classList.remove('sel');});d.classList.add('sel');};
    picker.appendChild(d);
  });
})();

document.addEventListener('keydown',function(e){keys[e.code]=true;if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].indexOf(e.code)>=0)e.preventDefault();});
document.addEventListener('keyup',function(e){keys[e.code]=false;});
var gb=document.getElementById('gasBtn'),bb=document.getElementById('brakeBtn');
gb.addEventListener('touchstart',function(e){e.preventDefault();gasOn=true;});gb.addEventListener('touchend',function(){gasOn=false;});
bb.addEventListener('touchstart',function(e){e.preventDefault();brakeOn=true;});bb.addEventListener('touchend',function(){brakeOn=false;});

resetTruck();buildPickups();distance=0;score=0;playing=false;camX=0;
loop();
})();
