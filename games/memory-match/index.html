<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Match - RehaVerse Games</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Segoe UI',sans-serif;color:#fff;padding:16px}
  h1{font-size:1.8rem;color:#ec4899;margin-bottom:10px}
  .stats{display:flex;gap:16px;margin-bottom:16px;font-size:0.9rem;color:#94a3b8}.stats span{color:#ec4899;font-weight:700}
  #board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;max-width:400px}
  @media(min-width:600px){#board{max-width:480px;gap:12px}}
  .card{aspect-ratio:3/4;background:linear-gradient(135deg,#1a1a3e,#24245a);border:2px solid #3b3b6e;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:2.5rem;transition:all 0.3s;user-select:none}
  @media(min-width:600px){.card{font-size:3rem}}
  .card::before{content:'?';color:#4a4a8a;font-size:2rem;font-weight:800}
  .card.flipped,.card.matched{background:linear-gradient(135deg,#24245a,#2e2e6a);border-color:#ec4899;transform:rotateY(0)}
  .card.flipped::before,.card.matched::before{content:attr(data-emoji)}
  .card.matched{border-color:#10b981;opacity:0.65;pointer-events:none}
  .card:hover:not(.flipped):not(.matched){border-color:#7c3aed;transform:scale(1.04)}
  .btn{margin-top:18px;padding:12px 28px;background:#ec4899;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer}
  #msg{margin-top:14px;font-size:1.1rem;font-weight:700;min-height:28px;color:#10b981}
</style>
</head>
<body>
<h1>🃏 Memory Match</h1>
<div class="stats">
  <div>Moves: <span id="moves">0</span></div>
  <div>Pairs: <span id="pairs">0</span>/8</div>
  <div>Time: <span id="timer">0s</span></div>
</div>
<div id="board"></div>
<div id="msg"></div>
<button class="btn" onclick="init()">New Game</button>

<script>
const actx=new(window.AudioContext||window.webkitAudioContext)();
function tone(f,t,d){const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(0.1,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+d);o.start();o.stop(actx.currentTime+d);}
function flipSound(){tone(500,'sine',0.06);}
function matchSound(){tone(600,'square',0.1);setTimeout(()=>tone(800,'square',0.12),80);}
function noMatchSound(){tone(250,'triangle',0.15);}
function winSound(){[0,80,160,240,320].forEach((d,i)=>setTimeout(()=>tone(500+i*80,'square',0.15),d));}

const EMOJIS=['🔥','💧','🌿','⚡','🌙','☀️','❄️','💎'];
let cards,flipped,matched,moves,startTime,timerInterval;

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function init(){
  actx.resume();
  const deck=shuffle([...EMOJIS,...EMOJIS]);
  cards=deck.map((emoji,i)=>({id:i,emoji,flipped:false,matched:false}));
  flipped=[];matched=0;moves=0;
  document.getElementById('msg').textContent='';
  document.getElementById('moves').textContent=0;
  document.getElementById('pairs').textContent='0';
  if(timerInterval)clearInterval(timerInterval);
  startTime=Date.now();
  timerInterval=setInterval(()=>{document.getElementById('timer').textContent=Math.floor((Date.now()-startTime)/1000)+'s';},1000);
  render();
}

function render(){
  const board=document.getElementById('board');board.innerHTML='';
  cards.forEach((card,i)=>{const el=document.createElement('div');el.className='card'+(card.flipped?' flipped':'')+(card.matched?' matched':'');el.dataset.emoji=card.emoji;el.onclick=()=>flip(i);board.appendChild(el);});
}

function flip(i){
  if(cards[i].flipped||cards[i].matched||flipped.length>=2)return;
  cards[i].flipped=true;flipped.push(i);flipSound();render();
  if(flipped.length===2){
    moves++;document.getElementById('moves').textContent=moves;
    const[a,b]=flipped;
    if(cards[a].emoji===cards[b].emoji){
      cards[a].matched=true;cards[b].matched=true;matched++;
      document.getElementById('pairs').textContent=matched;flipped=[];
      setTimeout(()=>{matchSound();render();},200);
      if(matched===8){clearInterval(timerInterval);const t=Math.floor((Date.now()-startTime)/1000);winSound();
        document.getElementById('msg').textContent=`🎉 You won in ${moves} moves and ${t}s!`;}
    }else{
      setTimeout(()=>{noMatchSound();cards[a].flipped=false;cards[b].flipped=false;flipped=[];render();},800);
    }
  }
}
init();
</script>
</body>
</html>
