<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elemental Chain — by RehaVerse Studios</title>
<meta name="description" content="Chain elemental reactions in this addictive puzzle game. Fire+Water=Steam, Lightning+Water=Boom!">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f1a;
    --panel:    #1a1a2e;
    --border:   #2a2a45;
    --fire:     #FF6B35;
    --water:    #4FC3F7;
    --earth:    #8BC34A;
    --air:      #E0E0E0;
    --lightning:#FFD600;
    --text:     #ffffff;
    --muted:    #888899;
    --radius:   10px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  header {
    width: 100%;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--lightning);
    letter-spacing: 2px;
  }
  .logo span { color: #fff; }
  .studio { font-size: 11px; color: var(--muted); letter-spacing: 1px; }

  /* ── Main layout ── */
  main {
    width: 100%;
    max-width: 480px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  /* ── HUD ── */
  .hud {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
  }
  .hud-box {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px;
    text-align: center;
  }
  .hud-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
  .hud-val { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; }
  .hud-val.score { color: var(--lightning); }
  .hud-val.danger { color: var(--fire); }
  .hud-val.level { color: var(--earth); }

  /* ── Messages ── */
  .msg-area {
    height: 28px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--lightning);
    letter-spacing: 1px;
    text-align: center;
    transition: opacity 0.3s;
  }

  /* ── Grid ── */
  .grid-wrap { position: relative; }
  .grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 4px;
  }
  .cell {
    width: 68px;
    height: 68px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: #1e1e35;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    transition: transform 0.1s, border-color 0.15s;
    user-select: none;
    position: relative;
    overflow: hidden;
  }
  .cell:hover { transform: scale(1.06); }
  .cell.hint { border-color: var(--lightning); border-width: 2.5px; box-shadow: 0 0 8px var(--lightning); }
  .cell.fire      { background: #2a1200; border-color: var(--fire); }
  .cell.water     { background: #001a2a; border-color: var(--water); }
  .cell.earth     { background: #0d1a00; border-color: var(--earth); }
  .cell.air       { background: #1a1a1a; border-color: var(--air); }
  .cell.lightning { background: #1a1400; border-color: var(--lightning); }
  .cell.pop { animation: pop 0.35s ease-out forwards; }
  .cell.explode { animation: explode 0.4s ease-out forwards; }
  @keyframes pop { 0%{transform:scale(1.2)} 100%{transform:scale(1)} }
  @keyframes explode { 0%{transform:scale(1.3);opacity:1} 100%{transform:scale(0.3);opacity:0} }

  /* ── Palette ── */
  .palette {
    display: flex;
    gap: 8px;
    justify-content: center;
  }
  .elem-btn {
    width: 64px;
    height: 72px;
    border-radius: 12px;
    border: 2px solid transparent;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    transition: transform 0.1s, border-color 0.1s;
    position: relative;
    user-select: none;
  }
  .elem-btn:hover { transform: scale(1.05); }
  .elem-btn.selected { transform: scale(1.12); border-width: 2.5px; }
  .elem-btn.empty { opacity: 0.3; pointer-events: none; }
  .elem-btn .emoji { font-size: 28px; line-height: 1; }
  .elem-btn .count {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 700;
  }
  .elem-btn[data-elem="fire"]      { background:#2a1200; border-color:var(--fire); }
  .elem-btn[data-elem="water"]     { background:#001a2a; border-color:var(--water); }
  .elem-btn[data-elem="earth"]     { background:#0d1a00; border-color:var(--earth); }
  .elem-btn[data-elem="air"]       { background:#1a1a1a; border-color:var(--air); }
  .elem-btn[data-elem="lightning"] { background:#1a1400; border-color:var(--lightning); }
  .elem-btn[data-elem="fire"] .count      { color:var(--fire); }
  .elem-btn[data-elem="water"] .count     { color:var(--water); }
  .elem-btn[data-elem="earth"] .count     { color:var(--earth); }
  .elem-btn[data-elem="air"] .count       { color:var(--air); }
  .elem-btn[data-elem="lightning"] .count { color:var(--lightning); }

  /* ── Controls ── */
  .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .btn {
    padding: 9px 18px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--panel);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.15s;
  }
  .btn:hover { background: #2a2a45; }
  .btn.primary { background: var(--fire); border-color: var(--fire); }
  .btn.primary:hover { background: #ff8c5a; }

  /* ── Coins ── */
  .coins-row {
    font-family: 'Rajdhani', sans-serif;
    font-size: 15px;
    color: var(--lightning);
    letter-spacing: 0.5px;
  }

  /* ── Reaction legend ── */
  .legend {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
  }
  .legend-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
  .legend-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .legend-item { font-size: 13px; color: #ccc; }

  /* ── Overlay ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px; z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.show { opacity: 1; pointer-events: all; }
  .overlay h2 { font-family: 'Rajdhani', sans-serif; font-size: 32px; font-weight: 700; letter-spacing: 2px; }
  .overlay .big { font-family: 'Rajdhani', sans-serif; font-size: 56px; font-weight: 700; color: var(--lightning); }
  .overlay p { font-size: 15px; color: var(--muted); text-align: center; }

  /* ── Footer ── */
  footer {
    margin-top: auto;
    padding: 16px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
  }
  footer a { color: var(--lightning); text-decoration: none; }

  /* ── Responsive ── */
  @media (max-width: 440px) {
    .cell { width: calc((100vw - 56px) / 6); height: calc((100vw - 56px) / 6); font-size: 22px; }
    .elem-btn { width: calc((100vw - 72px) / 5); height: 64px; }
    .elem-btn .emoji { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">⚡ ELEMENTAL <span>CHAIN</span></div>
    <div class="studio">REHAVERSE STUDIOS</div>
  </div>
  <div style="font-size:13px;color:var(--muted)">Play free · No download needed</div>
</header>

<main>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-box"><div class="hud-label">Score</div><div class="hud-val score" id="score">0</div></div>
    <div class="hud-box"><div class="hud-label">Moves</div><div class="hud-val" id="moves" style="color:#fff">15</div></div>
    <div class="hud-box"><div class="hud-label">Best</div><div class="hud-val" id="best" style="color:#fff">0</div></div>
    <div class="hud-box"><div class="hud-label">Level</div><div class="hud-val level" id="level">1</div></div>
  </div>

  <div class="coins-row" id="coins">🪙 100 coins</div>
  <div class="msg-area" id="msg"></div>

  <!-- Grid -->
  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <!-- Palette -->
  <div class="palette" id="palette"></div>

  <!-- Controls -->
  <div class="controls">
    <button class="btn" onclick="undoMove()">↩ Undo</button>
    <button class="btn primary" onclick="newGame()">New Game</button>
    <button class="btn" onclick="showHint()">💡 Hint</button>
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-title">🔬 Reaction combos</div>
    <div class="legend-row">
      <span class="legend-item">🔥+💧=💨</span>
      <span class="legend-item">🔥+⚡=☄️</span>
      <span class="legend-item">💧+⚡=⚡</span>
      <span class="legend-item">🌿+🌀=🌪️</span>
      <span class="legend-item">🌿+⚡=💥</span>
      <span class="legend-item">🔥+🌀=🌪️</span>
    </div>
  </div>

</main>

<!-- Overlay -->
<div class="overlay" id="overlay">
  <h2 id="ov-title">LEVEL CLEAR!</h2>
  <div class="big" id="ov-score">0</div>
  <p id="ov-msg">Amazing!</p>
  <button class="btn primary" onclick="closeOverlay()" style="margin-top:8px;font-size:16px;padding:12px 32px">Continue</button>
</div>

<footer>
  <p>© 2026 RehaVerse Studios &nbsp;·&nbsp; <a href="/elemental-chain-privacy/">Privacy Policy</a> &nbsp;·&nbsp;
  <a href="https://play.google.com/store/apps/details?id=com.rehaverse.elementalchain" target="_blank">📱 Get the Android app</a></p>
</footer>

<script>
// ── Game Engine ───────────────────────────────────────────
const ELEMENTS = {
  fire:      { emoji:'🔥', color:'#FF6B35', label:'Fire' },
  water:     { emoji:'💧', color:'#4FC3F7', label:'Water' },
  earth:     { emoji:'🌿', color:'#8BC34A', label:'Earth' },
  air:       { emoji:'🌀', color:'#E0E0E0', label:'Air' },
  lightning: { emoji:'⚡', color:'#FFD600', label:'Lightning' },
};
const GRID = 6;
const REACTIONS = [
  {a:'fire',  b:'water',     score:80,  msg:'💨 Steam Burst!',     spread:'air',       chance:0.45},
  {a:'fire',  b:'earth',     score:40,  msg:'🔥 Scorched Earth!',  destroyB:false},
  {a:'fire',  b:'air',       score:65,  msg:'🌪️ Firestorm!',       spread:'fire',      chance:0.4},
  {a:'fire',  b:'lightning', score:110, msg:'☄️ Plasma Ignition!', spread:'lightning', chance:0.5},
  {a:'water', b:'earth',     score:50,  msg:'🌱 Mud & Growth!',    spread:'earth',     chance:0.35, destroyA:false},
  {a:'water', b:'lightning', score:130, msg:'⚡ Electrocution!',   spread:'lightning', chance:0.55},
  {a:'water', b:'air',       score:45,  msg:'🌧️ Rain Cloud!',      destroyB:true},
  {a:'earth', b:'air',       score:55,  msg:'🌪️ Dust Devil!',      spread:'air',       chance:0.4},
  {a:'earth', b:'lightning', score:75,  msg:'💥 Earthshatter!',    spread:'lightning', chance:0.45},
  {a:'air',   b:'lightning', score:95,  msg:'🌩️ Thunder Strike!',  spread:'lightning', chance:0.5},
];

function getReaction(a, b) {
  if (!a || !b) return null;
  for (const r of REACTIONS) {
    if ((r.a===a&&r.b===b)||(r.a===b&&r.b===a)) {
      const fl = r.a===b;
      return {
        destroyA: fl ? (r.destroyB!==false) : (r.destroyA!==false),
        destroyB: fl ? (r.destroyA!==false) : (r.destroyB!==false),
        score: r.score, msg: r.msg,
        spread: r.spread||null, chance: r.chance||0,
      };
    }
  }
  return null;
}

function neighbors(r, c) {
  return [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].filter(([rr,cc])=>rr>=0&&rr<GRID&&cc>=0&&cc<GRID);
}

function computeReactions(grid) {
  const seen = new Set(), rxns = [];
  for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) {
    if (!grid[r][c]) continue;
    for (const [nr,nc] of neighbors(r,c)) {
      if (!grid[nr][nc]) continue;
      const key = [Math.min(r*10+c,nr*10+nc),Math.max(r*10+c,nr*10+nc)].join('-');
      if (seen.has(key)) continue;
      const rxn = getReaction(grid[r][c],grid[nr][nc]);
      if (rxn) { rxns.push({r,c,nr,nc,rxn}); seen.add(key); }
    }
  }
  if (!rxns.length) return {newGrid:grid, rxns:[]};
  const ng = grid.map(row=>[...row]);
  const destroyed = new Set(), spawns = [];
  rxns.forEach(({r,c,nr,nc,rxn})=>{
    if (rxn.destroyA) destroyed.add(`${r},${c}`);
    if (rxn.destroyB) destroyed.add(`${nr},${nc}`);
    if (rxn.spread) {
      const sr=rxn.destroyA?nr:r, sc=rxn.destroyA?nc:c;
      neighbors(sr,sc).forEach(([x,y])=>{ if(!ng[x][y]&&Math.random()<rxn.chance) spawns.push({r:x,c:y,e:rxn.spread}); });
    }
  });
  destroyed.forEach(k=>{const[r,c]=k.split(',');ng[r][c]=null;});
  spawns.forEach(({r,c,e})=>{if(!ng[r][c])ng[r][c]=e;});
  return {newGrid:ng, rxns};
}

function isClear(grid) { return grid.every(row=>row.every(c=>!c)); }

function genLevel(level) {
  const g = Array.from({length:GRID},()=>Array(GRID).fill(null));
  const elems = Object.keys(ELEMENTS);
  const count = Math.min(8+level*2, 28);
  let placed=0, tries=0;
  while (placed<count&&tries<200) {
    const r=Math.floor(Math.random()*GRID), c=Math.floor(Math.random()*GRID);
    if (!g[r][c]) { g[r][c]=elems[Math.floor(Math.random()*elems.length)]; placed++; }
    tries++;
  }
  return g;
}

function getInventory(level) {
  return { fire:Math.min(5+level,12), water:Math.min(5+level,12), earth:Math.min(4+level,10), air:Math.min(3+level,8), lightning:Math.min(3+level,8) };
}

function getBestHint(grid, inv) {
  let best=null, bestScore=0;
  for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) {
    if (grid[r][c]) continue;
    for (const elem of Object.keys(ELEMENTS)) {
      if (!inv[elem]) continue;
      let s=0;
      neighbors(r,c).forEach(([nr,nc])=>{ const rxn=getReaction(elem,grid[nr][nc]); if(rxn) s+=rxn.score; });
      if (s>bestScore) { bestScore=s; best={r,c,elem}; }
    }
  }
  return best;
}

// ── State ─────────────────────────────────────────────────
let grid, selected=null, inventory, score=0, best=0, moves=15, level=1, coins=100;
let isAnimating=false, history=[], hintCell=null, msgTimer=null;

// ── Render ────────────────────────────────────────────────
function render() {
  renderGrid(); renderPalette(); renderHUD();
}

function renderGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  for (let r=0;r<GRID;r++) for (let c=0;c<GRID;c++) {
    const el = document.createElement('div');
    const tile = grid[r][c];
    el.className = 'cell' + (tile?' '+tile:'');
    if (hintCell && hintCell.r===r && hintCell.c===c) el.classList.add('hint');
    el.textContent = tile ? ELEMENTS[tile].emoji : '';
    el.dataset.r = r; el.dataset.c = c;
    el.onclick = () => placeElement(r, c);
    g.appendChild(el);
  }
}

function renderPalette() {
  const p = document.getElementById('palette');
  p.innerHTML = '';
  for (const [key, el] of Object.entries(ELEMENTS)) {
    const count = inventory[key]||0;
    const btn = document.createElement('div');
    btn.className = 'elem-btn' + (selected===key?' selected':'') + (!count?' empty':'');
    btn.dataset.elem = key;
    btn.innerHTML = `<span class="emoji">${el.emoji}</span><span class="count">${count}</span>`;
    btn.onclick = () => { if(count) { selected = selected===key?null:key; renderPalette(); } else showMsg('No '+el.label+' left!'); };
    p.appendChild(btn);
  }
}

function renderHUD() {
  document.getElementById('score').textContent = score;
  const movEl = document.getElementById('moves');
  movEl.textContent = moves;
  movEl.style.color = moves<=3?'#FF6B35':'#fff';
  document.getElementById('best').textContent = best;
  document.getElementById('level').textContent = level;
  document.getElementById('coins').textContent = '🪙 '+coins+' coins';
}

function showMsg(msg, duration=2000) {
  clearTimeout(msgTimer);
  document.getElementById('msg').textContent = msg;
  msgTimer = setTimeout(()=>{ document.getElementById('msg').textContent=''; }, duration);
}

// ── Game actions ──────────────────────────────────────────
function placeElement(r, c) {
  if (isAnimating) return;
  if (!selected) { showMsg('Select an element first! 👇'); return; }
  if (!inventory[selected]) { showMsg('No '+ELEMENTS[selected].label+' left!'); return; }
  if (grid[r][c]) { showMsg('Cell is occupied!'); return; }

  history.push({grid:grid.map(r=>[...r]), inventory:{...inventory}, score, moves});
  if (history.length>5) history.shift();

  const cg = grid.map(r=>[...r]);
  cg[r][c] = selected;
  inventory[selected]--;
  moves--;
  grid = cg;
  isAnimating = true;
  hintCell = null;
  render();

  let chainDepth=0, totalScore=0;

  const cascade = g => {
    const {newGrid, rxns} = computeReactions(g);
    if (!rxns.length) {
      isAnimating = false;
      score += totalScore;
      best = Math.max(best, score);
      render();
      if (isClear(newGrid)) levelClear();
      else if (moves<=0) gameOver();
      return;
    }
    chainDepth++;
    const stepScore = Math.floor(rxns.reduce((s,{rxn})=>s+rxn.score,0)*(1+chainDepth*0.6));
    totalScore += stepScore;
    showMsg(rxns[0].rxn.msg, 1200);
    rxns.forEach(({r,c,nr,nc})=>{ flashCell(r,c); flashCell(nr,nc); });
    if (chainDepth>1) showMsg(getChainLabel(chainDepth)+' +'+stepScore, 1800);
    setTimeout(()=>{ grid=newGrid; render(); cascade(newGrid); }, 420);
  };
  cascade(cg);
}

function flashCell(r, c) {
  const el = document.querySelector(`[data-r="${r}"][data-c="${c}"]`);
  if (!el) return;
  el.classList.add('explode');
  setTimeout(()=>el.classList.remove('explode'), 450);
}

function getChainLabel(n) {
  const l=['','','DOUBLE CHAIN! 🔥','TRIPLE BLAST! ⚡','MEGA CHAIN! 💥','ULTRA COMBO! 🌟','LEGENDARY! 👑'];
  return l[Math.min(n,l.length-1)]||`${n}× CHAIN! ✨`;
}

function levelClear() {
  level++;
  showOverlay('🎉 LEVEL CLEAR!', score, `Welcome to Level ${level}!`);
  setTimeout(()=>{ grid=genLevel(level); inventory=getInventory(level); moves=15+level-1; render(); closeOverlay(); }, 2500);
}

function gameOver() {
  showOverlay('😤 OUT OF MOVES', score, `Best: ${best} · Try again!`);
}

function showOverlay(title, sc, msg) {
  document.getElementById('ov-title').textContent = title;
  document.getElementById('ov-score').textContent = sc;
  document.getElementById('ov-msg').textContent = msg;
  document.getElementById('overlay').classList.add('show');
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
  if (moves<=0&&!isClear(grid)) newGame();
}

function undoMove() {
  if (!history.length) { showMsg('Nothing to undo!'); return; }
  const h = history.pop();
  grid=h.grid; inventory=h.inventory; score=h.score; moves=h.moves;
  render(); showMsg('Move undone ↩');
}

function showHint() {
  const hint = getBestHint(grid, inventory);
  if (hint) {
    hintCell = hint; selected = hint.elem;
    showMsg(`💡 Try ${ELEMENTS[hint.elem].emoji} ${ELEMENTS[hint.elem].label} there!`);
    renderGrid(); renderPalette();
    setTimeout(()=>{ hintCell=null; renderGrid(); }, 2500);
  } else {
    showMsg('Place any element to start!');
  }
}

function newGame() {
  grid=genLevel(level); inventory=getInventory(level);
  score=0; moves=15+level-1; selected=null; hintCell=null;
  isAnimating=false; history=[];
  document.getElementById('msg').textContent='';
  document.getElementById('overlay').classList.remove('show');
  render();
}

// ── Start ─────────────────────────────────────────────────
newGame();
</script>
</body>
</html>
